<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gem: pentagon silhouette with classic facet coloring -->

  <!-- Crown top face (table) - lightest, catching overhead light -->
  <polygon points="9,5 23,5 26,11 6,11" fill="#f3e8ff"/>

  <!-- Crown left face -->
  <polygon points="2,15 6,11 9,5" fill="#c084fc"/>

  <!-- Crown right face (in shadow) -->
  <polygon points="30,15 26,11 23,5" fill="#7c3aed"/>

  <!-- Crown front face (girdle band) -->
  <polygon points="2,15 6,11 26,11 30,15" fill="#e9d5ff"/>

  <!-- Pavilion main face -->
  <polygon points="2,15 30,15 16,29" fill="#a855f7"/>

  <!-- Pavilion right (deeper shadow, adds depth) -->
  <polygon points="20,15 30,15 16,29" fill="#6b21a8"/>

  <!-- Outline -->
  <polygon points="9,5 23,5 30,15 16,29 2,15" fill="none" stroke="#3b0764" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Shine highlight (upper-left) -->
  <ellipse cx="12" cy="9" rx="2.8" ry="1.1" fill="white" opacity="0.5" transform="rotate(-25 12 9)"/>
</svg>

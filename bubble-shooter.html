<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh; /* Fix for tabbed cellphones */
    height: 100svh;
    width: 100vw;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
    box-sizing: border-box;
}

#appShell {
    width: min(100vw, 1200px);
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
}

canvas {
    background: #1b2440;
    display: block;
    flex: 1 1 auto;
}

#controlDock {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, rgba(14, 19, 36, 0.98), rgba(10, 13, 24, 0.98));
    border-top: 1px solid rgba(95, 211, 255, 0.35);
    min-height: 78px;
    box-sizing: border-box;
}

#nextBubblePanel {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 14px;
}

#nextBubbleCanvas {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
}

#controlButtons {
    display: flex;
    gap: 10px;
}

.ctrl-btn {
    width: 44px;
    height: 44px;
    padding: 0;
    border: 1px solid rgba(95, 211, 255, 0.45);
    border-radius: 8px;
    background: rgba(95, 211, 255, 0.12);
    color: #dff9ff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
}

.ctrl-btn:active {
    transform: scale(0.97);
}

#settingsPanel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(90vw, 320px);
    background: rgba(15, 20, 36, 0.96);
    border: 1px solid rgba(95, 211, 255, 0.5);
    border-radius: 12px;
    box-shadow: 0 0 28px rgba(0, 242, 255, 0.2);
    padding: 16px;
    z-index: 30;
    display: none;
}

#settingsPanel h3 {
    margin: 0 0 14px 0;
    color: #5fd3ff;
}

.setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.setting-row:first-of-type {
    border-top: none;
}

#settingsPanel .close-settings {
    margin-top: 12px;
    width: 100%;
    height: 42px;
    padding: 0 14px;
}

.settings-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 25;
    display: none;
}

/* UI Overlay Styles */
#uiOverlay {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 25, 40, 0.95);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
    border: 1px solid #5fd3ff;
    z-index: 10;
}
#uiOverlay h1 {
    margin-top: 0;
    color: #5fd3ff;
    text-shadow: 0 0 10px #5fd3ff;
}
#uiOverlay h2 {
    margin-bottom: 30px;
    font-size: 28px;
}
.btn {
    padding: 12px 20px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
    margin: 5px;
    transition: transform 0.1s;
}
.btn:active {
    transform: scale(0.95);
}
.share-row {
    margin-top: 12px;

.share-btn {
    width: 48px;

    border-radius: 12px;

    place-items: center;

.share-btn img {
    width: 24px;
    height: 24px;
    display: block;

.btn-new { background: #5fd3ff; color: #111; width: 100%; margin: 15px 0 0 0; }
.share-x { background: #111111; }
.share-wa { background: #25d366; }
.share-tg { background: #179cde; }
.share-copy { background: #69748c; }

Object.defineProperties(game, {

    SHOT_POSITION_EPSILON: { get() { return this.constants.SHOT_POSITION_EPSILON; } },
    MAX_SHOT_EVENTS_PER_FRAME: { get() { return this.constants.MAX_SHOT_EVENTS_PER_FRAME; } },
    MAX_TRAJECTORY_EVENTS: { get() { return this.constants.MAX_TRAJECTORY_EVENTS; } },
    START_ROWS: { get() { return this.constants.START_ROWS; } },
    COLORS: { get() { return this.constants.COLORS; } },
    BASE_MISSES_PER_DROP: { get() { return this.constants.BASE_MISSES_PER_DROP; } },

    BOARD_CLEAR_BONUS: { get() { return this.constants.BOARD_CLEAR_BONUS; } },

function isStandaloneMode() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function isIosBrowser() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function loadSettings() {
    try {
        const raw = localStorage.getItem(game.SETTINGS_KEY);
        if (!raw) return { ...game.defaultSettings };
        const parsed = JSON.parse(raw);
        return {
            soundEnabled: parsed.soundEnabled === true,
            showAimGuide: parsed.showAimGuide !== false
        };
    } catch {
        return { ...game.defaultSettings };
    }
}

function saveSettings() {
    localStorage.setItem(game.SETTINGS_KEY, JSON.stringify(game.settings));
}

function syncSettingsUi() {
    soundToggle.checked = game.settings.soundEnabled;
    guideToggle.checked = game.settings.showAimGuide;

    aimBtn.setAttribute("aria-pressed", String(game.settings.showAimGuide));
    aimBtn.setAttribute("title", game.settings.showAimGuide ? "Aim Guide On" : "Aim Guide Off");
    aimBtn.textContent = game.settings.showAimGuide ? "🎯" : "🚫";

    volumeBtn.setAttribute("aria-pressed", String(game.settings.soundEnabled));
    volumeBtn.setAttribute("title", game.settings.soundEnabled ? "Sound On" : "Sound Off");
    volumeBtn.textContent = game.settings.soundEnabled ? "🔊" : "🔇";
}

function openSettings() {
    syncSettingsUi();
    settingsBackdrop.style.display = "block";
    settingsPanel.style.display = "block";
}

function closeSettings() {
    settingsBackdrop.style.display = "none";
    settingsPanel.style.display = "none";
}

function ensureAudioContext() {
    if (!game.audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        game.audioContext = new AudioCtx();
    }
    if (game.audioContext.state === "suspended") {
        game.audioContext.resume();
    }
    return game.audioContext;
}

function playTone(type, options) {
    if (!game.settings) {
        game.settings = { ...game.defaultSettings };
    }
    if (!game.settings.soundEnabled) return;
    const ctxAudio = ensureAudioContext();
    if (!ctxAudio) return;

    const now = ctxAudio.currentTime;
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(options.startFreq, now);
    if (options.endFreq !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.endFreq), now + options.duration);
    }
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(options.peak, now + options.attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + options.duration);
    osc.connect(gain);
    gain.connect(ctxAudio.destination);
    osc.start(now);
    osc.stop(now + options.duration + 0.02);
}

// Hex math
function key(q, r) { return q + "," + r; }
function neighbors(q, r) { return [[q+1,r], [q-1,r], [q,r+1], [q,r-1], [q+1,r-1], [q-1,r+1]]; }
function parseKey(k) {
    const comma = k.indexOf(",");
    return [Number(k.slice(0, comma)), Number(k.slice(comma + 1))];
}
function randomFrom(list) { return list[Math.floor(Math.random() * list.length)]; }
function hexToPixel(q, r) { return { x: game.R * Math.sqrt(3) * (q + r/2) + canvas.width/2, y: game.R * 1.5 * r + game.ceilingY + game.R }; }
function pixelToHex(x, y) {
    x -= canvas.width / 2; y -= game.ceilingY + game.R;
    return hexRound((Math.sqrt(3)/3 * x - y/3) / game.R, (2/3 * y) / game.R);
}
function hexRound(q, r) {
    let x=q, z=r, y=-x-z;
    let rx=Math.round(x), ry=Math.round(y), rz=Math.round(z);
    let xd=Math.abs(rx-x), yd=Math.abs(ry-y), zd=Math.abs(rz-z);
    if(xd>yd && xd>zd) rx=-ry-rz; else if(yd>zd) ry=-rx-rz; else rz=-rx-ry;
    return [rx, rz];
}

function findNearestEmptyHex(x, y) {
    let [q, r] = pixelToHex(x, y);
    return findNearestEmptyHexAround(q, r, x, y);
}

function findNearestEmptyNeighbor(targetQ, targetR, x, y) {
    const targetCenter = hexToPixel(targetQ, targetR);
    const incomingX = x - targetCenter.x;
    const incomingY = y - targetCenter.y;
    let best = null;
    let bestScore = -Infinity;
    let bestDist = Infinity;
    const candidates = [[targetQ, targetR], ...neighbors(targetQ, targetR)];

    for (const [cq, cr] of candidates) {
        const k = key(cq, cr);
        if (game.grid.has(k)) continue;
        const p = hexToPixel(cq, cr);
        const dx = p.x - targetCenter.x;
        const dy = p.y - targetCenter.y;
        const dot = dx * incomingX + dy * incomingY;
        const dist = (x - p.x) ** 2 + (y - p.y) ** 2;
        if (dot > bestScore || (dot === bestScore && dist < bestDist)) {
            bestScore = dot;
            bestDist = dist;
            best = [cq, cr];
        }
    }

    return best || [targetQ, targetR];
}

function findNearestEmptyHexAround(q, r, x, y) {
    let best = null;
    let bestDist = Infinity;
    const candidates = [[q, r], ...neighbors(q, r)];

    for (const [cq, cr] of candidates) {
        const k = key(cq, cr);
        if (game.grid.has(k)) continue;
        const p = hexToPixel(cq, cr);
        const dx = x - p.x;
        const dy = y - p.y;
        const dist = dx * dx + dy * dy;
        if (dist < bestDist) {
            bestDist = dist;
            best = [cq, cr];
        }
    }

    return best || [q, r];
}

function activeColors() { let s=new Set(); game.grid.forEach(v=>s.add(v.color)); return [...s]; }
function unlockedColors() { return game.COLORS.slice(0, game.unlockedColorCount); }
function getPlayableRowSlots(row) {
    const slots = [];
    const startQ = -Math.floor((game.COLS + 4) / 2);
    for (let i = 0; i <= game.COLS + 4; i++) {
        const q = startQ + i;
        const p = hexToPixel(q, row);
        if (p.x >= game.R && p.x <= canvas.width - game.R) slots.push(q);
    }
    return slots;
}

function getColorPools(source = "shot") {
    const unlocked = unlockedColors();
    if (unlocked.length === 0) {
        return { available: [game.COLORS[0]], active: [] };
    }

    let available = unlocked.filter(c => !game.clearedColors.has(c));

    // Keep shots matchable: active pool should include colors still present in the game,
    // including bubbles already queued to fire.
    let active = activeColors().filter(c => available.includes(c));
    if (game.currentBubble && available.includes(game.currentBubble.color) && !active.includes(game.currentBubble.color)) {
        active.push(game.currentBubble.color);
    }
    if (game.nextBubble && available.includes(game.nextBubble.color) && !active.includes(game.nextBubble.color)) {
        active.push(game.nextBubble.color);
    }
    if (active.length === 0 && available.length > 0) active = [...available];

    return { available, active };
}

function buildCeilingRowColors(count) {
    const colors = [];
    for (let i = 0; i < count; i++) colors.push(randomColor("ceiling"));

    if (count < 3) return colors;

    const distinct = new Set(colors);
    if (distinct.size > 1) return colors;

    const pools = getColorPools("ceiling");
    const diversityPool = pools.active.length > 0 && pools.active.length <= 2 ? pools.active : pools.available;
    if (diversityPool.length < 2) return colors;

    const base = colors[0];
    const alternatives = diversityPool.filter(c => c !== base);
    if (alternatives.length === 0) return colors;

    const injectAt = Math.floor(Math.random() * count);
    colors[injectAt] = randomFrom(alternatives);
    return colors;
}

function randomColor(source = "shot") {
    const pools = getColorPools(source);
    const available = pools.available;
    const active = pools.active;

    if (available.length === 0) {
        const boardActive = activeColors();
        return boardActive.length > 0 ? boardActive[0] : game.COLORS[0];
    }

    if (source === "ceiling" && active.length > 0 && active.length <= 2) {
        return randomFrom(active);
    }

    // Keep color-pool removal influence, but avoid runaway collapse to 1-2 colors.
    // Shots still mostly follow active colors; roof rows use more unlocked colors to keep pressure.
    let preferActiveChance = source === "ceiling" ? 0.55 : 0.8;
    if (active.length <= 2) preferActiveChance = source === "ceiling" ? 0.25 : 0.45;
    if (active.length === 0 || Math.random() > preferActiveChance) {
        return randomFrom(available);
    }
    return randomFrom(active);
}

function refreshQueuedBubbleColors() {
    if (game.currentBubble && game.clearedColors.has(game.currentBubble.color)) {
        game.currentBubble = createBubble(randomColor("shot"));
    }
    if (game.nextBubble && game.clearedColors.has(game.nextBubble.color)) {
        game.nextBubble = createBubble(randomColor("shot"));
    }
}

function getLinesToDropForActiveColors() {
    const activeCount = activeColors().length;
    const clampedActive = Math.max(1, Math.min(5, activeCount));
    return 6 - clampedActive;
}

function createBubble(color) { return { x:game.shooter.x, y:game.shooter.y, vx:0, vy:0, color:color, moving:false }; }

function initBoard() {
    game.grid.clear();
    for (let r = 0; r < game.START_ROWS; r++) {
        const rowSlots = getPlayableRowSlots(r);
        for (let i = 0; i < rowSlots.length; i++) {
            const q = rowSlots[i];
            if (Math.random() < 0.9) {
                const pool = unlockedColors();
                game.grid.set(key(q, r), { color: randomFrom(pool) });
            }
        }
    }
}

function injectUnlockedColor(color) {
    const topKeys = [];
    game.grid.forEach((v, k) => {
        let [, r] = parseKey(k);
        if (r === 0) topKeys.push(k);
    });
    if (topKeys.length > 0) {
        const picked = randomFrom(topKeys);
        game.grid.set(picked, { color });
        return;
    }

    const fallbackQ = 0;
    game.grid.set(key(fallbackQ, 0), { color });
}

function shoot() {
    if (game.shotBubble || game.gameOver || game.win) return;
    let dx = game.mouseX - game.shooter.x, dy = game.mouseY - game.shooter.y, l = Math.hypot(dx, dy);
    if (dy > -10) return; // Prevent shooting downward
    dx /= l; dy /= l;

    game.currentBubble.vx = dx * game.SPEED;
    game.currentBubble.vy = dy * game.SPEED;
    game.currentBubble.moving = true;
    game.shotBubble = game.currentBubble;
    game.shotsFired++;
    updateLevelFromShots();
    game.currentBubble = createBubble(game.nextBubble.color);
    game.nextBubble = createBubble(randomColor("shot"));
}

function findSegmentBubbleCollision(startX, startY, endX, endY) {
    const dx = endX - startX;
    const dy = endY - startY;
    const segmentLengthSq = dx * dx + dy * dy;
    if (segmentLengthSq === 0) return null;

    let earliestHit = null;
    const collisionRadius = game.R * 2 - 2;
    const collisionRadiusSq = collisionRadius * collisionRadius;

    for (let [k] of game.grid) {
        const [q, r] = parseKey(k);
        const center = hexToPixel(q, r);
        const relX = startX - center.x;
        const relY = startY - center.y;
        const a = segmentLengthSq;
        const b = 2 * (relX * dx + relY * dy);
        const c = relX * relX + relY * relY - collisionRadiusSq;
        const discriminant = b * b - 4 * a * c;
        if (discriminant < 0) continue;

        const root = Math.sqrt(discriminant);
        const candidateTs = [(-b - root) / (2 * a), (-b + root) / (2 * a)];
        for (const t of candidateTs) {
            if (t < game.SHOT_EVENT_EPSILON || t > 1) continue;
            if (!earliestHit || t < earliestHit.t) {
                earliestHit = {
                    t,
                    x: startX + dx * t,
                    y: startY + dy * t,
                    targetQ: q,
                    targetR: r
                };
            }
        }
    }

    return earliestHit;
}

function getNextShotEvent(startX, startY, vx, vy, maxTime) {
    const segmentEndX = startX + vx * maxTime;
    const segmentEndY = startY + vy * maxTime;
    let bestEvent = {
        type: "move",
        time: maxTime,
        x: segmentEndX,
        y: segmentEndY
    };

    const bubbleHit = findSegmentBubbleCollision(startX, startY, segmentEndX, segmentEndY);
    if (bubbleHit) {
        const bubbleTime = maxTime * bubbleHit.t;
        if (bubbleTime < bestEvent.time) {
            bestEvent = {
                type: "bubble",
                time: bubbleTime,
                x: bubbleHit.x,
                y: bubbleHit.y
            };
        }
    }

    if (vy < -game.SHOT_EVENT_EPSILON) {
        const ceilingTime = (game.ceilingY + game.R - startY) / vy;
        if (ceilingTime >= game.SHOT_EVENT_EPSILON && ceilingTime < bestEvent.time) {
            bestEvent = {
                type: "ceiling",
                time: ceilingTime,
                x: startX + vx * ceilingTime,
                y: game.ceilingY + game.R
            };
        }
    }

    if (vx > game.SHOT_EVENT_EPSILON) {
        const rightWallTime = (canvas.width - game.R - startX) / vx;
        if (rightWallTime >= game.SHOT_EVENT_EPSILON && rightWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: rightWallTime,
                x: canvas.width - game.R,
                y: startY + vy * rightWallTime
            };
        }
    } else if (vx < -game.SHOT_EVENT_EPSILON) {
        const leftWallTime = (game.R - startX) / vx;
        if (leftWallTime >= game.SHOT_EVENT_EPSILON && leftWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: leftWallTime,
                x: game.R,
                y: startY + vy * leftWallTime
            };
        }
    }

    return bestEvent;
}

function advanceShotBubble(deltaSeconds) {
    let remainingTime = deltaSeconds;
    let handledEvents = 0;

    while (game.shotBubble && game.shotBubble.moving && remainingTime > game.SHOT_EVENT_EPSILON && handledEvents < game.MAX_SHOT_EVENTS_PER_FRAME) {
        handledEvents++;
        const event = getNextShotEvent(game.shotBubble.x, game.shotBubble.y, game.shotBubble.vx, game.shotBubble.vy, remainingTime);

        game.shotBubble.x = event.x;
        game.shotBubble.y = event.y;

        if (event.type === "move") {
            break;
        }

        if (event.type === "wall") {
            game.shotBubble.vx *= -1;
            game.shotBubble.x = Math.min(
                canvas.width - game.R,
                Math.max(game.R, game.shotBubble.x + Math.sign(game.shotBubble.vx) * game.SHOT_POSITION_EPSILON)
            );
            remainingTime -= event.time;
            continue;
        }

        if (event.type === "bubble") {
            playTingSound();
        }
        snapBubble(event);
        return;
    }
}

function traceShotPath(startX, startY, vx, vy, maxSeconds) {
    const points = [{ x: startX, y: startY }];
    let x = startX;
    let y = startY;
    let currentVx = vx;
    let currentVy = vy;
    let remainingTime = maxSeconds;
    let handledEvents = 0;

    while (remainingTime > game.SHOT_EVENT_EPSILON && handledEvents < game.MAX_TRAJECTORY_EVENTS) {
        handledEvents++;
        const event = getNextShotEvent(x, y, currentVx, currentVy, remainingTime);
        points.push({ x: event.x, y: event.y });

        if (event.type === "move" || event.type === "bubble" || event.type === "ceiling") {
            break;
        }

        remainingTime -= event.time;
        currentVx *= -1;
        x = Math.min(canvas.width - game.R, Math.max(game.R, event.x + Math.sign(currentVx) * game.SHOT_POSITION_EPSILON));
        y = event.y;
    }

    return points;
}

function updateLevelFromShots() {
    const targetLevel = 1 + Math.floor(game.shotsFired / game.SHOTS_PER_LEVEL);
    if (targetLevel <= game.level) return;

    while (game.level < targetLevel) {
        game.level++;

        const targetUnlockedCount = Math.min(
            game.BASE_COLOR_COUNT + Math.floor((game.level - 1) / 4),
            game.COLORS.length
        );

        if (targetUnlockedCount > game.unlockedColorCount && !game.firstColorCleared) {
            game.unlockedColorCount = targetUnlockedCount;
            injectUnlockedColor(game.COLORS[game.unlockedColorCount - 1]);
        }

        game.maxMissesForCycle = Math.max(
            game.BASE_MISSES_PER_DROP - Math.floor((game.level - 1) / 3),
            game.MIN_MISSES_PER_DROP
        );
        game.currentMissesLeft = Math.min(game.currentMissesLeft, game.maxMissesForCycle);
        updateRoofHeight();
    }
}

function snapBubble(collisionEvent) {
    if (!game.shotBubble) return;

    let q, r;
    if (collisionEvent && collisionEvent.type === "bubble" && collisionEvent.targetQ !== undefined) {
        [q, r] = findNearestEmptyNeighbor(collisionEvent.targetQ, collisionEvent.targetR, collisionEvent.x, collisionEvent.y);
    } else {
        [q, r] = findNearestEmptyHex(game.shotBubble.x, game.shotBubble.y);
    }

    let k = key(q, r);
    if (!game.grid.has(k)) game.grid.set(k, { color: game.shotBubble.color });

    let match = findMatches(q, r);
    if (match.length >= 3) {
        // HIT: Ignore miss counter
        playBlopSound();
        game.pendingExplosion = match;
        game.explosionTimer = game.EXPLOSION_DELAY;
        game.combo++;
    } else {
        // MISS
        game.combo = 0;
        game.islandTimer = game.ISLAND_DELAY;

        game.currentMissesLeft--;
        if (game.currentMissesLeft <= 0) {
            const linesToDrop = getLinesToDropForActiveColors();
            for (let i = 0; i < linesToDrop; i++) {
                dropCeiling();
            }
            game.currentMissesLeft = game.maxMissesForCycle;
        }
    }

    game.shotBubble = null;
    checkGameOver();
}

function findMatches(q, r) {
    if (!game.grid.has(key(q, r))) return [];
    let color = game.grid.get(key(q, r)).color;
    let stack = [[q, r]], visited = new Set(), match = [];
    while (stack.length) {
        let [cq, cr] = stack.pop(), k = key(cq, cr);
        if (visited.has(k)) continue; visited.add(k);
        let cell = game.grid.get(k); if (!cell || cell.color !== color) continue;
        match.push([cq, cr]);
        const near = neighbors(cq, cr);
        for (let i = 0; i < near.length; i++) stack.push(near[i]);
    }
    return match;
}

function explode() {
    if (!game.pendingExplosion) return;
    let prevColors = activeColors();
    const comboMultiplier = Math.max(1, game.combo);
    game.pendingExplosion.forEach(([q, r]) => {
        game.grid.delete(key(q, r));
        game.score += game.MATCH_SCORE * comboMultiplier;
    });
    game.pendingExplosion = null; game.islandTimer = game.ISLAND_DELAY;
    checkLevelUp(prevColors);
}

function removeFloating() {
    let visited = new Set(), stack = [];
    game.grid.forEach((v, k) => { let [q, r] = parseKey(k); if (r === 0) stack.push([q, r]); });
    while (stack.length) {
        let [q, r] = stack.pop(), k = key(q, r);
        if (visited.has(k)) continue; visited.add(k);
        const near = neighbors(q, r);
        for (let i = 0; i < near.length; i++) {
            const nq = near[i][0];
            const nr = near[i][1];
            if (game.grid.has(key(nq, nr))) stack.push([nq, nr]);
        }
    }
    let prevColors = activeColors();
    let floatingRemoved = 0;
    game.grid.forEach((v, k) => {
        if (!visited.has(k)) {
            game.grid.delete(k);
            floatingRemoved++;
            game.score += game.FLOATING_SCORE * Math.max(1, game.combo);
        }
    });
    checkLevelUp(prevColors);
    checkWin();
}

function checkLevelUp(prevColorsList) {
    const currentSet = new Set(activeColors());
    if (game.currentBubble) currentSet.add(game.currentBubble.color);
    if (game.nextBubble) currentSet.add(game.nextBubble.color);
    const cleared = prevColorsList.filter(c => !currentSet.has(c));

    if (cleared.length > 0) {
        if (!game.firstColorCleared) {
            game.firstColorCleared = true;
        }
        game.score += game.COLOR_CLEAR_BONUS * cleared.length;
        cleared.forEach(c => game.clearedColors.add(c));
        refreshQueuedBubbleColors();
    }
}

function dropCeiling() {
    let newGrid = new Map();
    // Axial rows naturally shift right when r increases; alternate with q-1 to shift left on every other drop.
    const qShift = game.dropShiftLeftNext ? -1 : 0;
    game.grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        const nextQ = q + qShift;
        let p = hexToPixel(nextQ, r + 1);
        if (p.x >= game.R && p.x <= canvas.width - game.R) newGrid.set(key(nextQ, r + 1), v);
    });

    const openSlots = getPlayableRowSlots(0);

    const rowColors = buildCeilingRowColors(openSlots.length);
    for (let i = 0; i < openSlots.length; i++) {
        newGrid.set(key(openSlots[i], 0), { color: rowColors[i] });
    }

    game.grid = newGrid;
    game.dropShiftLeftNext = !game.dropShiftLeftNext;
}

function showOverlay(title) {
    uiTitle.innerText = title;
    uiScore.innerText = "Score: " + game.score;
    uiOverlay.style.display = "block";
}

function checkGameOver() {
    game.grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        let p = hexToPixel(q, r);
        if (p.y > game.shooter.y - game.R * 2) { game.gameOver = true; showOverlay("Game Over"); }
    });
}

function checkWin() {
    if (game.grid.size === 0) {
        game.score += game.BOARD_CLEAR_BONUS;
        game.win = true;
        showOverlay("You Win!");
    }
}

function shareScore(platform) {
    // Build emoji at runtime from code points to avoid source-file encoding corruption
    let text = `Bubble Shooter score: ${game.score} points, level ${game.level}. Can you beat this run?`;
    let emoji = '🟡🟢🔵🔴🟣';
    let url = encodeURIComponent(location.href);
    let shareUrl = "";
    
    if (platform === 'copy') {
        const copyText = `${text} ${emoji}\n${location.href}`;
        navigator.clipboard.writeText(copyText).then(() => {
            alert("Score copied to clipboard!");
        }).catch(err => {
            console.error("Failed to copy:", err);
            alert("Failed to copy to clipboard");
        });
        return;
    }
    if (platform === 'x') shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text+emoji)}&url=${url}`;
    if (platform === 'wa') {
        const waText = `${location.href}\n${text}`;
        shareUrl = `https://wa.me/?text=${encodeURIComponent(waText)}`;
    }
    if (platform === 'tg') shareUrl = `https://t.me/share/url?url=${url}&text=${encodeURIComponent(text+emoji)}`;
    
    window.open(shareUrl, '_blank');
}

function update(deltaSeconds) {
    if (game.gameOver || game.win) return;
    if (game.explosionTimer > 0) {
        game.explosionTimer = Math.max(0, game.explosionTimer - deltaSeconds);
        if (game.explosionTimer === 0) explode();
    }
    if (game.islandTimer > 0) {
        game.islandTimer = Math.max(0, game.islandTimer - deltaSeconds);
        if (game.islandTimer === 0) removeFloating();
    }
    
    if (game.shotBubble && game.shotBubble.moving) {
        advanceShotBubble(deltaSeconds);
    }
}

function drawTrajectory() {
    if (!game.settings.showAimGuide) return;
    if (game.shotBubble || game.gameOver || game.win || (game.isTouchDevice && !game.touchAimActive)) return; 
    
    let dx = game.mouseX - game.shooter.x;
    let dy = game.mouseY - game.shooter.y;
    if (dy > -10) return;
    
    let angle = Math.atan2(dy, dx);
    let vx = Math.cos(angle) * game.SPEED;
    let vy = Math.sin(angle) * game.SPEED;
    const path = traceShotPath(game.shooter.x, game.shooter.y, vx, vy, game.TRAJECTORY_STEP_SECONDS * 60);
    if (path.length < 2) return;
    
    ctx.beginPath();
    ctx.setLineDash([8, 12]);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.moveTo(path[0].x, path[0].y);

    for (let i = 1; i < path.length; i++) {
        ctx.lineTo(path[i].x, path[i].y);
    }

    ctx.stroke();
    ctx.setLineDash([]);
}

function drawBubble(x, y, color) {
    let g = ctx.createRadialGradient(x - game.R/3, y - game.R/3, game.R/5, x, y, game.R);
    g.addColorStop(0, "white"); g.addColorStop(0.3, color); g.addColorStop(1, "black");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, game.R, 0, Math.PI * 2); ctx.fill();
}

function drawGrid() {
    game.grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        let p = hexToPixel(q, r);
        drawBubble(p.x, p.y, v.color);
    });
}

function drawShooter() {
    drawTrajectory();
    drawBubble(game.shooter.x, game.shooter.y, game.currentBubble.color);
    if (game.shotBubble) drawBubble(game.shotBubble.x, game.shotBubble.y, game.shotBubble.color);

    // Draw Miss Indicators
    let indicatorR = 8;
    let startX = 20;
    let startY = canvas.height - 25;
    for(let i = 0; i < game.currentMissesLeft; i++) {
        ctx.beginPath();
        ctx.arc(startX + i * (indicatorR * 2 + 6), startY, indicatorR, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawNextBubblePreview() {
    nextBubbleCtx.clearRect(0, 0, nextBubbleCanvas.width, nextBubbleCanvas.height);
    if (!game.nextBubble) return;
    const cx = nextBubbleCanvas.width / 2;
    const cy = nextBubbleCanvas.height / 2;
    const previewR = Math.max(8, Math.floor(Math.min(nextBubbleCanvas.width, nextBubbleCanvas.height) / 2 - 5));
    const g = nextBubbleCtx.createRadialGradient(cx - previewR / 3, cy - previewR / 3, previewR / 5, cx, cy, previewR);
    g.addColorStop(0, "white");
    g.addColorStop(0.3, game.nextBubble.color);
    g.addColorStop(1, "black");
    nextBubbleCtx.fillStyle = g;
    nextBubbleCtx.beginPath();
    nextBubbleCtx.arc(cx, cy, previewR, 0, Math.PI * 2);
    nextBubbleCtx.fill();
}

function drawScore() {
    ctx.save();
    ctx.font = "bold 36px sans-serif";
    ctx.textAlign = "right";
    const sx = canvas.width - 20;
    const sy = canvas.height - 20;
    // Outer glow
    ctx.shadowColor = "#00f2ff";
    ctx.shadowBlur = 32;
    ctx.fillStyle = "rgba(0, 242, 255, 0.5)";
    ctx.fillText(game.score, sx, sy);
    // Mid glow
    ctx.shadowBlur = 12;
    ctx.fillStyle = "rgba(180, 248, 255, 0.9)";
    ctx.fillText(game.score, sx, sy);
    // Sharp white core
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(game.score, sx, sy);
    ctx.restore();
}

function drawCeiling() {
    // Dark zone above the current ceiling
    ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
    ctx.fillRect(0, 0, canvas.width, game.ceilingY - 1);
    // Glowing ceiling line
    ctx.save();
    ctx.shadowColor = "#00f2ff";
    ctx.shadowBlur = 8;
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, game.ceilingY - 1);
    ctx.lineTo(canvas.width, game.ceilingY - 1);
    ctx.stroke();
    ctx.restore();
    // Level label
    ctx.font = "bold 13px sans-serif";
    ctx.fillStyle = "#5fd3ff";
    ctx.textAlign = "left";
    ctx.fillText("LEVEL " + game.level, 10, game.ceilingY - 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawCeiling();
    drawShooter();
    drawScore();
    drawNextBubblePreview();
}

let lastFrameTime = performance.now();

function loop(timestamp) {
    const deltaSeconds = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
    lastFrameTime = timestamp;
    update(deltaSeconds);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

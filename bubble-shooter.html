<style>
body {
    margin: 0;
    background: #111;

#appShell {
    width: min(100vw, 1200px);

    align-items: stretch;
    justify-content: flex-start;
}

canvas {

#controlDock {

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const appShell = document.getElementById("appShell");
const controlDock = document.getElementById("controlDock");
const nextBubbleCanvas = document.getElementById("nextBubbleCanvas");
const nextBubbleCtx = nextBubbleCanvas.getContext("2d");
const aimBtn = document.getElementById("aimBtn");
const newGameBtn = document.getElementById("newGameBtn");
const volumeBtn = document.getElementById("volumeBtn");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const settingsBackdrop = document.getElementById("settingsBackdrop");
const closeSettingsBtn = document.getElementById("closeSettingsBtn");
const soundToggle = document.getElementById("soundToggle");
const guideToggle = document.getElementById("guideToggle");
const uiOverlay = document.getElementById("uiOverlay");
const uiTitle = document.getElementById("uiTitle");
const uiScore = document.getElementById("uiScore");
const installBtn = document.getElementById("installBtn");
const manifestLink = document.getElementById("manifestLink");

const SETTINGS_KEY = "bubbleShooterSettings";
const defaultSettings = { soundEnabled: false, showAimGuide: true };
let settings = loadSettings();
let audioContext = null;

const SPEED = 960;
const EXPLOSION_DELAY = 8 / 60;
const ISLAND_DELAY = 8 / 60;
const TRAJECTORY_STEP_SECONDS = 1 / 24;
const SHOT_EVENT_EPSILON = 0.0001;
const SHOT_POSITION_EPSILON = 0.01;
const MAX_SHOT_EVENTS_PER_FRAME = 8;
const MAX_TRAJECTORY_EVENTS = 24;
let COLS = 1; 

let R = 18; 
const START_ROWS = 7;
const COLORS = ["#FF355E", "#FFFF66", "#29FF14", "#0066FF", "#AA00FF", "#FF9900", "#FFFFFF", "#777777"]
let grid = new Map();
let score = 0, combo = 0;
let clearedColors = new Set();
const BASE_MISSES_PER_DROP = 3;
const MIN_MISSES_PER_DROP = 2;
const SHOTS_PER_LEVEL = 30;
const BASE_COLOR_COUNT = 5;
const LEVELS_PER_ROOF_LOWER = 3
const ROOF_LOWER_STEP_ROWS = 0.5;
let maxMissesForCycle = BASE_MISSES_PER_DROP;
let currentMissesLeft = BASE_MISSES_PER_DROP;
let dropShiftLeftNext = false;
let level = 1;
let shotsFired = 0;
let unlockedColorCount = BASE_COLOR_COUNT;
let ceilingY = 40 - R; // top border of the playfield; row 0 sits one radius below it
let gameOver = false, win = false;
let shotBubble = null, explosionTimer = 0, islandTimer = 0, pendingExplosion = null;
const MATCH_SCORE = 10;
const FLOATING_SCORE = 20;
const COLOR_CLEAR_BONUS = 150;
const BOARD_CLEAR_BONUS = 1000;

let shooter = { x: 0, y: 0, angle: 0 };
let mouseX = 0, mouseY = 0;
let isTouchDevice = false;
let touchAimActive = false;
let installPromptEvent = null;

let currentBubble, nextBubble;

function isStandaloneMode() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function isIosBrowser() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function loadSettings() {
    try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return { ...defaultSettings };
        const parsed = JSON.parse(raw);
        return {
            soundEnabled: parsed.soundEnabled === true,
            showAimGuide: parsed.showAimGuide !== false
        };
    } catch {
        return { ...defaultSettings };
    }
}

function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function syncSettingsUi() {
    soundToggle.checked = settings.soundEnabled;
    guideToggle.checked = settings.showAimGuide;

    aimBtn.setAttribute("aria-pressed", String(settings.showAimGuide));
    aimBtn.setAttribute("title", settings.showAimGuide ? "Aim Guide On" : "Aim Guide Off");
    aimBtn.textContent = settings.showAimGuide ? "🎯" : "🚫";

    volumeBtn.setAttribute("aria-pressed", String(settings.soundEnabled));
    volumeBtn.setAttribute("title", settings.soundEnabled ? "Sound On" : "Sound Off");
    volumeBtn.textContent = settings.soundEnabled ? "🔊" : "🔇";
}

function openSettings() {
    syncSettingsUi();
    settingsBackdrop.style.display = "block";
    settingsPanel.style.display = "block";
}

function closeSettings() {
    settingsBackdrop.style.display = "none";
    settingsPanel.style.display = "none";
}

function ensureAudioContext() {
    if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        audioContext = new AudioCtx();
    }
    if (audioContext.state === "suspended") {
        audioContext.resume();
    }
    return audioContext;
}

function playTone(type, options) {
    if (!settings.soundEnabled) return;
    const ctxAudio = ensureAudioContext();
    if (!ctxAudio) return;

    const now = ctxAudio.currentTime;
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(options.startFreq, now);
    if (options.endFreq !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.endFreq), now + options.duration);
    }
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(options.peak, now + options.attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + options.duration);
    osc.connect(gain);
    gain.connect(ctxAudio.destination);
    osc.start(now);
    osc.stop(now + options.duration + 0.02);
}

function playTingSound() {
    playTone("triangle", { startFreq: 880, endFreq: 1220, attack: 0.01, duration: 0.12, peak: 0.12 });
}

function playBlopSound() {
    playTone("sine", { startFreq: 420, endFreq: 210, attack: 0.01, duration: 0.2, peak: 0.16 });
}

function buildWebAppManifest() {
    const iconSvg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='#1b2440'/><circle cx='96' cy='96' r='70' fill='#5fd3ff'/><circle cx='72' cy='70' r='26' fill='white' opacity='0.55'/></svg>";
    const iconUrl = "data:image/svg+xml," + encodeURIComponent(iconSvg);
    const startUrl = new URL(location.pathname.split("/").pop() || "bubble-shooter.html", location.href).toString();
    const scopeUrl = new URL(".", location.href).toString();
    const manifest = {
        name: "Bubble Shooter",
        short_name: "Bubbles",
        start_url: startUrl,
        scope: scopeUrl,
        display: "standalone",
        background_color: "#111111",
        theme_color: "#1b2440",
        description: "Deterministic HTML Canvas bubble shooter with hex-grid snapping and floating-island clears.",
        icons: [
            { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
            { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    manifestLink.href = URL.createObjectURL(blob);
}

function updateInstallButton() {
    if (isStandaloneMode()) {
        installBtn.style.display = "none";
        return;
    }
    if (installPromptEvent) {
        installBtn.textContent = "📲";
        installBtn.title = "Install App";
        installBtn.style.display = "inline-flex";
        return;
    }
    if (isIosBrowser()) {
        installBtn.textContent = "🏠";
        installBtn.title = "Add to Home Screen";
        installBtn.style.display = "inline-flex";
        return;
    }
    installBtn.style.display = "none";
}

async function registerWebAppSupport() {
    buildWebAppManifest();
    if (!("serviceWorker" in navigator) || location.protocol === "file:") {
        updateInstallButton();
        return;
    }
    try {
        await navigator.serviceWorker.register("./service-worker.js");
    } catch (error) {
        console.warn("Service worker registration failed", error);
    }
    updateInstallButton();
}

function getRowHeight() {
    return R * 1.5;
}

function getBaseCeilingY() {
    return 40 - R;
}

function updateRoofHeight() {
    const roofLowerSteps = Math.floor((level - 1) / LEVELS_PER_ROOF_LOWER);
    ceilingY = getBaseCeilingY() + roofLowerSteps * getRowHeight() * ROOF_LOWER_STEP_ROWS;
}

function getViewportHeight() {
    if (window.visualViewport && Number.isFinite(window.visualViewport.height)) {
        return Math.floor(window.visualViewport.height);
    }
    return window.innerHeight;
}

// Resize logic to fit window and handle mobile viewports safely
function resizeCanvas() {
    const viewportHeight = getViewportHeight();
    const shellWidth = Math.min(window.innerWidth, 1200);
    appShell.style.width = shellWidth + "px";
    appShell.style.height = viewportHeight + "px";
    const dockHeight = controlDock.offsetHeight || 78;
    canvas.height = Math.max(320, viewportHeight - dockHeight);
    R = Math.floor(canvas.height / 40);//Dynamic bubble size based on height, keeping ~30 rows visible
    canvas.width = shellWidth;
    COLS = Math.floor(canvas.width / (R * Math.sqrt(3)));
    updateRoofHeight();
    shooter.x = canvas.width / 2;
    shooter.y = canvas.height - Math.max(54, R * 3); // Keep launcher above the board floor area
    mouseX = shooter.x;
    mouseY = shooter.y - 100;
}
window.addEventListener("resize", resizeCanvas);
if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", resizeCanvas);
}
resizeCanvas();
syncSettingsUi();

// Hex math
function key(q, r) { return q + "," + r; }
function neighbors(q, r) { return [[q+1,r], [q-1,r], [q,r+1], [q,r-1], [q+1,r-1], [q-1,r+1]]; }
function parseKey(k) {
    const comma = k.indexOf(",");
    return [Number(k.slice(0, comma)), Number(k.slice(comma + 1))];
}
function randomFrom(list) { return list[Math.floor(Math.random() * list.length)]; }
function hexToPixel(q, r) { return { x: R * Math.sqrt(3) * (q + r/2) + canvas.width/2, y: R * 1.5 * r + ceilingY + R }; }
function pixelToHex(x, y) {
    x -= canvas.width / 2; y -= ceilingY + R;
    return hexRound((Math.sqrt(3)/3 * x - y/3) / R, (2/3 * y) / R);
}
function hexRound(q, r) {
    let x=q, z=r, y=-x-z;
    let rx=Math.round(x), ry=Math.round(y), rz=Math.round(z);
    let xd=Math.abs(rx-x), yd=Math.abs(ry-y), zd=Math.abs(rz-z);
    if(xd>yd && xd>zd) rx=-ry-rz; else if(yd>zd) ry=-rx-rz; else rz=-rx-ry;
    return [rx, rz];
}

function activeColors() { let s=new Set(); grid.forEach(v=>s.add(v.color)); return [...s]; }
function unlockedColors() { return COLORS.slice(0, unlockedColorCount); }
function getPlayableRowSlots(row) {
    const slots = [];
    const startQ = -Math.floor((COLS + 4) / 2);
    for (let i = 0; i <= COLS + 4; i++) {
        const q = startQ + i;
        const p = hexToPixel(q, row);
        if (p.x >= R && p.x <= canvas.width - R) slots.push(q);
    }
    return slots;
}

function getColorPools(source = "shot") {
    const unlocked = unlockedColors();
    if (unlocked.length === 0) {
        return { available: [COLORS[0]], active: [] };
    }

    let available = unlocked.filter(c => !clearedColors.has(c));

    // Keep shots matchable: active pool should only include colors we may spawn.
    let active = activeColors().filter(c => available.includes(c));
    if (active.length === 0 && available.length > 0) active = [...available];

    return { available, active };
}

function buildCeilingRowColors(count) {
    const colors = [];
    for (let i = 0; i < count; i++) colors.push(randomColor("ceiling"));

    if (count < 3) return colors;

    const distinct = new Set(colors);
    if (distinct.size > 1) return colors;

    const pools = getColorPools("ceiling");
    const diversityPool = pools.active.length > 0 && pools.active.length <= 2 ? pools.active : pools.available;
    if (diversityPool.length < 2) return colors;

    const base = colors[0];
    const alternatives = diversityPool.filter(c => c !== base);
    if (alternatives.length === 0) return colors;

    const injectAt = Math.floor(Math.random() * count);
    colors[injectAt] = randomFrom(alternatives);
    return colors;
}

function randomColor(source = "shot") {
    const pools = getColorPools(source);
    const available = pools.available;
    const active = pools.active;

    if (available.length === 0) {
        const boardActive = activeColors();
        return boardActive.length > 0 ? boardActive[0] : COLORS[0];
    }

    if (source === "ceiling" && active.length > 0 && active.length <= 2) {
        return randomFrom(active);
    }

    // Keep color-pool removal influence, but avoid runaway collapse to 1-2 colors.
    // Shots still mostly follow active colors; roof rows use more unlocked colors to keep pressure.
    let preferActiveChance = source === "ceiling" ? 0.55 : 0.8;
    if (active.length <= 2) preferActiveChance = source === "ceiling" ? 0.25 : 0.45;
    if (active.length === 0 || Math.random() > preferActiveChance) {
        return randomFrom(available);
    }
    return randomFrom(active);
}

function refreshQueuedBubbleColors() {
    if (currentBubble && clearedColors.has(currentBubble.color)) {
        currentBubble = createBubble(randomColor("shot"));
    }
    if (nextBubble && clearedColors.has(nextBubble.color)) {
        nextBubble = createBubble(randomColor("shot"));
    }
}

function getLinesToDropForActiveColors() {
    const activeCount = activeColors().length;
    const clampedActive = Math.max(1, Math.min(5, activeCount));
    return 6 - clampedActive;
}

function createBubble(color) { return { x:shooter.x, y:shooter.y, vx:0, vy:0, color:color, moving:false }; }

function initBoard() {
    grid.clear();
    for (let r = 0; r < START_ROWS; r++) {
        const rowSlots = getPlayableRowSlots(r);
        for (let i = 0; i < rowSlots.length; i++) {
            const q = rowSlots[i];
            if (Math.random() < 0.9) {
                const pool = unlockedColors();
                grid.set(key(q, r), { color: randomFrom(pool) });
            }
        }
    }
}

function injectUnlockedColor(color) {
    const topKeys = [];
    grid.forEach((v, k) => {
        let [, r] = parseKey(k);
        if (r === 0) topKeys.push(k);
    });
    if (topKeys.length > 0) {
        const picked = randomFrom(topKeys);
        grid.set(picked, { color });
        return;
    }

    const fallbackQ = 0;
    grid.set(key(fallbackQ, 0), { color });
}

function startNewGame() {
    resizeCanvas();
    initBoard();
    score = 0; combo = 0; 
    clearedColors = new Set();
    shotsFired = 0;
    unlockedColorCount = BASE_COLOR_COUNT;
    maxMissesForCycle = BASE_MISSES_PER_DROP;
    currentMissesLeft = maxMissesForCycle;
    dropShiftLeftNext = false;
    level = 1;
    updateRoofHeight();
    gameOver = false; win = false;
    shotBubble = null; pendingExplosion = null;
    currentBubble = createBubble(randomColor("shot"));
    nextBubble = createBubble(randomColor("shot"));
    uiOverlay.style.display = "none";
}

function shoot() {
    if (shotBubble || gameOver || win) return;
    let dx = mouseX - shooter.x, dy = mouseY - shooter.y, l = Math.hypot(dx, dy);
    if (dy > -10) return; // Prevent shooting downward
    dx /= l; dy /= l;
    
    currentBubble.vx = dx * SPEED; 
    currentBubble.vy = dy * SPEED; 
    currentBubble.moving = true;
    shotBubble = currentBubble;
    shotsFired++;
    updateLevelFromShots();
    currentBubble = createBubble(nextBubble.color);
    nextBubble = createBubble(randomColor("shot"));
}

function findSegmentBubbleCollision(startX, startY, endX, endY) {
    const dx = endX - startX;
    const dy = endY - startY;
    const segmentLengthSq = dx * dx + dy * dy;
    if (segmentLengthSq === 0) return null;

    let earliestHit = null;
    const collisionRadius = R * 2 - 2;
    const collisionRadiusSq = collisionRadius * collisionRadius;

    for (let [k] of grid) {
        const [q, r] = parseKey(k);
        const center = hexToPixel(q, r);
        const relX = startX - center.x;
        const relY = startY - center.y;
        const a = segmentLengthSq;
        const b = 2 * (relX * dx + relY * dy);
        const c = relX * relX + relY * relY - collisionRadiusSq;
        const discriminant = b * b - 4 * a * c;
        if (discriminant < 0) continue;

        const root = Math.sqrt(discriminant);
        const candidateTs = [(-b - root) / (2 * a), (-b + root) / (2 * a)];
        for (const t of candidateTs) {
            if (t < SHOT_EVENT_EPSILON || t > 1) continue;
            if (!earliestHit || t < earliestHit.t) {
                earliestHit = {
                    t,
                    x: startX + dx * t,
                    y: startY + dy * t
                };
            }
        }
    }

    return earliestHit;
}

function getNextShotEvent(startX, startY, vx, vy, maxTime) {
    const segmentEndX = startX + vx * maxTime;
    const segmentEndY = startY + vy * maxTime;
    let bestEvent = {
        type: "move",
        time: maxTime,
        x: segmentEndX,
        y: segmentEndY
    };

    const bubbleHit = findSegmentBubbleCollision(startX, startY, segmentEndX, segmentEndY);
    if (bubbleHit) {
        const bubbleTime = maxTime * bubbleHit.t;
        if (bubbleTime < bestEvent.time) {
            bestEvent = {
                type: "bubble",
                time: bubbleTime,
                x: bubbleHit.x,
                y: bubbleHit.y
            };
        }
    }

    if (vy < -SHOT_EVENT_EPSILON) {
        const ceilingTime = (ceilingY + R - startY) / vy;
        if (ceilingTime >= SHOT_EVENT_EPSILON && ceilingTime < bestEvent.time) {
            bestEvent = {
                type: "ceiling",
                time: ceilingTime,
                x: startX + vx * ceilingTime,
                y: ceilingY + R
            };
        }
    }

    if (vx > SHOT_EVENT_EPSILON) {
        const rightWallTime = (canvas.width - R - startX) / vx;
        if (rightWallTime >= SHOT_EVENT_EPSILON && rightWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: rightWallTime,
                x: canvas.width - R,
                y: startY + vy * rightWallTime
            };
        }
    } else if (vx < -SHOT_EVENT_EPSILON) {
        const leftWallTime = (R - startX) / vx;
        if (leftWallTime >= SHOT_EVENT_EPSILON && leftWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: leftWallTime,
                x: R,
                y: startY + vy * leftWallTime
            };
        }
    }

    return bestEvent;
}

function advanceShotBubble(deltaSeconds) {
    let remainingTime = deltaSeconds;
    let handledEvents = 0;

    while (shotBubble && shotBubble.moving && remainingTime > SHOT_EVENT_EPSILON && handledEvents < MAX_SHOT_EVENTS_PER_FRAME) {
        handledEvents++;
        const event = getNextShotEvent(shotBubble.x, shotBubble.y, shotBubble.vx, shotBubble.vy, remainingTime);

        shotBubble.x = event.x;
        shotBubble.y = event.y;

        if (event.type === "move") {
            break;
        }

        if (event.type === "wall") {
            shotBubble.vx *= -1;
            shotBubble.x = Math.min(
                canvas.width - R,
                Math.max(R, shotBubble.x + Math.sign(shotBubble.vx) * SHOT_POSITION_EPSILON)
            );
            remainingTime -= event.time;
            continue;
        }

        if (event.type === "bubble") {
            playTingSound();
        }
        snapBubble();
        return;
    }
}

function traceShotPath(startX, startY, vx, vy, maxSeconds) {
    const points = [{ x: startX, y: startY }];
    let x = startX;
    let y = startY;
    let currentVx = vx;
    let currentVy = vy;
    let remainingTime = maxSeconds;
    let handledEvents = 0;

    while (remainingTime > SHOT_EVENT_EPSILON && handledEvents < MAX_TRAJECTORY_EVENTS) {
        handledEvents++;
        const event = getNextShotEvent(x, y, currentVx, currentVy, remainingTime);
        points.push({ x: event.x, y: event.y });

        if (event.type === "move" || event.type === "bubble" || event.type === "ceiling") {
            break;
        }

        remainingTime -= event.time;
        currentVx *= -1;
        x = Math.min(canvas.width - R, Math.max(R, event.x + Math.sign(currentVx) * SHOT_POSITION_EPSILON));
        y = event.y;
    }

    return points;
}

function updateLevelFromShots() {
    const targetLevel = 1 + Math.floor(shotsFired / SHOTS_PER_LEVEL);
    if (targetLevel <= level) return;

    while (level < targetLevel) {
        level++;

        const targetUnlockedCount = Math.min(
            BASE_COLOR_COUNT + Math.floor((level - 1) / 4),
            COLORS.length
        );

        if (targetUnlockedCount > unlockedColorCount) {
            unlockedColorCount = targetUnlockedCount;
            injectUnlockedColor(COLORS[unlockedColorCount - 1]);
        }

        maxMissesForCycle = Math.max(
            BASE_MISSES_PER_DROP - Math.floor((level - 1) / 3),
            MIN_MISSES_PER_DROP
        );
        currentMissesLeft = Math.min(currentMissesLeft, maxMissesForCycle);
        updateRoofHeight();
    }
}

function snapBubble() {
    if (!shotBubble) return;
    let [q, r] = pixelToHex(shotBubble.x, shotBubble.y), k = key(q, r);
    if (!grid.has(k)) grid.set(k, { color: shotBubble.color });
    
    let match = findMatches(q, r);
    if (match.length >= 3) { 
        // HIT: Ignore miss counter
        playBlopSound();
        pendingExplosion = match; 
        explosionTimer = EXPLOSION_DELAY; 
        combo++; 
    } else { 
        // MISS
        combo = 0; 
        islandTimer = ISLAND_DELAY; 

        currentMissesLeft--;
        if (currentMissesLeft <= 0) {
            const linesToDrop = getLinesToDropForActiveColors();
            for (let i = 0; i < linesToDrop; i++) {
                dropCeiling();
            }
            currentMissesLeft = maxMissesForCycle;
        }
    }
    
    shotBubble = null;
    checkGameOver();
}

function findMatches(q, r) {
    if (!grid.has(key(q, r))) return [];
    let color = grid.get(key(q, r)).color;
    let stack = [[q, r]], visited = new Set(), match = [];
    while (stack.length) {
        let [cq, cr] = stack.pop(), k = key(cq, cr);
        if (visited.has(k)) continue; visited.add(k);
        let cell = grid.get(k); if (!cell || cell.color !== color) continue;
        match.push([cq, cr]);
        const near = neighbors(cq, cr);
        for (let i = 0; i < near.length; i++) stack.push(near[i]);
    }
    return match;
}

function explode() {
    if (!pendingExplosion) return;
    let prevColors = activeColors();
    const comboMultiplier = Math.max(1, combo);
    pendingExplosion.forEach(([q, r]) => {
        grid.delete(key(q, r));
        score += MATCH_SCORE * comboMultiplier;
    });
    pendingExplosion = null; islandTimer = ISLAND_DELAY;
    checkLevelUp(prevColors);
}

function removeFloating() {
    let visited = new Set(), stack = [];
    grid.forEach((v, k) => { let [q, r] = parseKey(k); if (r === 0) stack.push([q, r]); });
    while (stack.length) {
        let [q, r] = stack.pop(), k = key(q, r);
        if (visited.has(k)) continue; visited.add(k);
        const near = neighbors(q, r);
        for (let i = 0; i < near.length; i++) {
            const nq = near[i][0];
            const nr = near[i][1];
            if (grid.has(key(nq, nr))) stack.push([nq, nr]);
        }
    }
    let prevColors = activeColors();
    let floatingRemoved = 0;
    grid.forEach((v, k) => {
        if (!visited.has(k)) {
            grid.delete(k);
            floatingRemoved++;
            score += FLOATING_SCORE * Math.max(1, combo);
        }
    });
    checkLevelUp(prevColors);
    checkWin();
}

function checkLevelUp(prevColorsList) {
    const currentSet = new Set(activeColors());
    const cleared = prevColorsList.filter(c => !currentSet.has(c));

    if (cleared.length > 0) {
        score += COLOR_CLEAR_BONUS * cleared.length;
        cleared.forEach(c => clearedColors.add(c));
        refreshQueuedBubbleColors();
    }
}

function dropCeiling() {
    let newGrid = new Map();
    // Axial rows naturally shift right when r increases; alternate with q-1 to shift left on every other drop.
    const qShift = dropShiftLeftNext ? -1 : 0;
    grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        const nextQ = q + qShift;
        let p = hexToPixel(nextQ, r + 1);
        if (p.x >= R && p.x <= canvas.width - R) newGrid.set(key(nextQ, r + 1), v);
    });

    const openSlots = getPlayableRowSlots(0);

    const rowColors = buildCeilingRowColors(openSlots.length);
    for (let i = 0; i < openSlots.length; i++) {
        newGrid.set(key(openSlots[i], 0), { color: rowColors[i] });
    }

    grid = newGrid;
    dropShiftLeftNext = !dropShiftLeftNext;
}

function showOverlay(title) {
    uiTitle.innerText = title;
    uiScore.innerText = "Score: " + score;
    uiOverlay.style.display = "block";
}

function checkGameOver() {
    grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        let p = hexToPixel(q, r);
        if (p.y > shooter.y - R * 2) { gameOver = true; showOverlay("Game Over"); }
    });
}

function checkWin() {
    if (grid.size === 0) {
        score += BOARD_CLEAR_BONUS;
        win = true;
        showOverlay("You Win!");
    }
}

function shareScore(platform) {
    // Build emoji at runtime from code points to avoid source-file encoding corruption
    let text = `Bubble Shooter score: ${score} points, level ${level}. Can you beat this run?`;
    let emoji = '🟡🟢🔵🔴🟣';
    let url = encodeURIComponent(location.href);
    let shareUrl = "";
    
    if (platform === 'copy') {
        const copyText = `${text} ${emoji}\n${location.href}`;
        navigator.clipboard.writeText(copyText).then(() => {
            alert("Score copied to clipboard!");
        }).catch(err => {
            console.error("Failed to copy:", err);
            alert("Failed to copy to clipboard");
        });
        return;
    }
    if (platform === 'x') shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text+emoji)}&url=${url}`;
    if (platform === 'wa') {
        const waText = `${location.href}\n${text}`;
        shareUrl = `https://wa.me/?text=${encodeURIComponent(waText)}`;
    }
    if (platform === 'tg') shareUrl = `https://t.me/share/url?url=${url}&text=${encodeURIComponent(text+emoji)}`;
    
    window.open(shareUrl, '_blank');
}

function update(deltaSeconds) {
    if (gameOver || win) return;
    if (explosionTimer > 0) {
        explosionTimer = Math.max(0, explosionTimer - deltaSeconds);
        if (explosionTimer === 0) explode();
    }
    if (islandTimer > 0) {
        islandTimer = Math.max(0, islandTimer - deltaSeconds);
        if (islandTimer === 0) removeFloating();
    }
    
    if (shotBubble && shotBubble.moving) {
        advanceShotBubble(deltaSeconds);
    }
}

function drawTrajectory() {
    if (!settings.showAimGuide) return;
    if (shotBubble || gameOver || win || (isTouchDevice && !touchAimActive)) return; 
    
    let dx = mouseX - shooter.x;
    let dy = mouseY - shooter.y;
    if (dy > -10) return;
    
    let angle = Math.atan2(dy, dx);
    let vx = Math.cos(angle) * SPEED;
    let vy = Math.sin(angle) * SPEED;
    const path = traceShotPath(shooter.x, shooter.y, vx, vy, TRAJECTORY_STEP_SECONDS * 60);
    if (path.length < 2) return;
    
    ctx.beginPath();
    ctx.setLineDash([8, 12]);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.moveTo(path[0].x, path[0].y);

    for (let i = 1; i < path.length; i++) {
        ctx.lineTo(path[i].x, path[i].y);
    }

    ctx.stroke();
    ctx.setLineDash([]);
}

function drawBubble(x, y, color) {
    let g = ctx.createRadialGradient(x - R/3, y - R/3, R/5, x, y, R);
    g.addColorStop(0, "white"); g.addColorStop(0.3, color); g.addColorStop(1, "black");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2); ctx.fill();
}

function drawGrid() {
    grid.forEach((v, k) => {
        let [q, r] = parseKey(k);
        let p = hexToPixel(q, r);
        drawBubble(p.x, p.y, v.color);
    });
}

function drawShooter() {
    drawTrajectory();
    drawBubble(shooter.x, shooter.y, currentBubble.color);
    if (shotBubble) drawBubble(shotBubble.x, shotBubble.y, shotBubble.color);

    // Draw Miss Indicators
    let indicatorR = 8;
    let startX = 20;
    let startY = canvas.height - 25;
    for(let i = 0; i < currentMissesLeft; i++) {
        ctx.beginPath();
        ctx.arc(startX + i * (indicatorR * 2 + 6), startY, indicatorR, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawNextBubblePreview() {
    nextBubbleCtx.clearRect(0, 0, nextBubbleCanvas.width, nextBubbleCanvas.height);
    if (!nextBubble) return;
    const cx = nextBubbleCanvas.width / 2;
    const cy = nextBubbleCanvas.height / 2;
    const previewR = Math.max(8, Math.floor(Math.min(nextBubbleCanvas.width, nextBubbleCanvas.height) / 2 - 5));
    const g = nextBubbleCtx.createRadialGradient(cx - previewR / 3, cy - previewR / 3, previewR / 5, cx, cy, previewR);
    g.addColorStop(0, "white");
    g.addColorStop(0.3, nextBubble.color);
    g.addColorStop(1, "black");
    nextBubbleCtx.fillStyle = g;
    nextBubbleCtx.beginPath();
    nextBubbleCtx.arc(cx, cy, previewR, 0, Math.PI * 2);
    nextBubbleCtx.fill();
}

function drawScore() {
    ctx.save();
    ctx.font = "bold 36px sans-serif";
    ctx.textAlign = "right";
    const sx = canvas.width - 20;
    const sy = canvas.height - 20;
    // Outer glow
    ctx.shadowColor = "#00f2ff";
    ctx.shadowBlur = 32;
    ctx.fillStyle = "rgba(0, 242, 255, 0.5)";
    ctx.fillText(score, sx, sy);
    // Mid glow
    ctx.shadowBlur = 12;
    ctx.fillStyle = "rgba(180, 248, 255, 0.9)";
    ctx.fillText(score, sx, sy);
    // Sharp white core
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(score, sx, sy);
    ctx.restore();
}

function drawCeiling() {
    // Dark zone above the current ceiling
    ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
    ctx.fillRect(0, 0, canvas.width, ceilingY - 1);
    // Glowing ceiling line
    ctx.save();
    ctx.shadowColor = "#00f2ff";
    ctx.shadowBlur = 8;
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ceilingY - 1);
    ctx.lineTo(canvas.width, ceilingY - 1);
    ctx.stroke();
    ctx.restore();
    // Level label
    ctx.font = "bold 13px sans-serif";
    ctx.fillStyle = "#5fd3ff";
    ctx.textAlign = "left";
    ctx.fillText("LEVEL " + level, 10, ceilingY - 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawCeiling();
    drawShooter();
    drawScore();
    drawNextBubblePreview();
}

let lastFrameTime = performance.now();

function loop(timestamp) {
    const deltaSeconds = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
    lastFrameTime = timestamp;
    update(deltaSeconds);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>

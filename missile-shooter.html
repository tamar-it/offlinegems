<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const appShell = document.getElementById("appShell");
const controlDock = document.getElementById("controlDock");
const nextMissileCanvas = document.getElementById("nextMissileCanvas");
const nextMissileCtx = nextMissileCanvas.getContext("2d");
const aimBtn = document.getElementById("aimBtn");
const newGameBtn = document.getElementById("newGameBtn");
const volumeBtn = document.getElementById("volumeBtn");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const settingsBackdrop = document.getElementById("settingsBackdrop");
const closeSettingsBtn = document.getElementById("closeSettingsBtn");
const soundToggle = document.getElementById("soundToggle");
const guideToggle = document.getElementById("guideToggle");
const uiOverlay = document.getElementById("uiOverlay");
const uiTitle = document.getElementById("uiTitle");
const uiScore = document.getElementById("uiScore");
const installBtn = document.getElementById("installBtn");
const manifestLink = document.getElementById("manifestLink");

const SETTINGS_KEY = "missileShooterSettings";
const defaultSettings = { soundEnabled: false, showAimGuide: true };
let settings = loadSettings();
let audioContext = null;

const REFERENCE_FPS = 60;
const SPEED = 30;
const SHOT_EVENT_EPSILON = 0.0001;
const SHOT_POSITION_EPSILON = 0.01;
const MAX_SHOT_EVENTS_PER_FRAME = 8;
const MAX_TRAJECTORY_EVENTS = 24;
let COLS = 1;
let R = 18;
const START_ROWS = 7;
const ARMOR_TYPES = [
    { id: "ceramic", color: "#f5f7ee", accent: "#d2dcee" },
    { id: "reactive", color: "#3fd5ff", accent: "#b5f2ff" },
    { id: "titan", color: "#8fa5ff", accent: "#d8e2ff" },
    { id: "carbon", color: "#4de389", accent: "#b6ffd4" },
    { id: "plasma", color: "#ff7a5c", accent: "#ffd5cb" },
    { id: "obsidian", color: "#9522ff", accent: "#e597ff" },
    { id: "ember", color: "#ffbe3b", accent: "#ffe5ad" },
    { id: "shadow", color: "#8f9bb3", accent: "#e4e9f2" }
];

let grid = new Map();
let score = 0;
let combo = 0;
let clearedArmor = new Set();
const BASE_MISSES_PER_DROP = 3;
const MIN_MISSES_PER_DROP = 2;
const SHOTS_PER_LEVEL = 30;
const BASE_ARMOR_COUNT = 5;
const LEVELS_PER_ROOF_LOWER = 3;
const ROOF_LOWER_STEP_ROWS = 0.5;
let maxMissesForCycle = BASE_MISSES_PER_DROP;
let currentMissesLeft = BASE_MISSES_PER_DROP;
let dropShiftLeftNext = false;
let level = 1;
let shotsFired = 0;
let unlockedArmorCount = BASE_ARMOR_COUNT;
let ceilingY = 40 - R;
let gameOver = false;
let win = false;
let shotMissile = null;
let explosionTimer = 0;
let islandTimer = 0;
let pendingExplosion = null;
let explosionClouds = [];

const MATCH_SCORE = 10;
const FLOATING_SCORE = 20;
const ARMOR_CLEAR_BONUS = 150;
const BOARD_CLEAR_BONUS = 1000;

let launcher = { x: 0, y: 0, angle: 0 };
let mouseX = 0;
let mouseY = 0;
let isTouchDevice = false;
let touchAimActive = false;
let installPromptEvent = null;

let currentMissile;
let nextMissile;

function getMissileCollisionRadius() {
    const missileScale = Math.max(0.95, R / 18);
    const spriteHalfHeight = 6 * missileScale;
    // Use the sprite body width, not drone radius, so a shot can pass through any gap at least this wide.
    return spriteHalfHeight;
}

function distancePointToSegmentSquared(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    if (dx === 0 && dy === 0) {
        const sx = px - x1;
        const sy = py - y1;
        return sx * sx + sy * sy;
    }

    const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
    const cx = x1 + t * dx;
    const cy = y1 + t * dy;
    const ox = px - cx;
    const oy = py - cy;
    return ox * ox + oy * oy;
}

function isStandaloneMode() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function isIosBrowser() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function loadSettings() {
    try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return { ...defaultSettings };
        const parsed = JSON.parse(raw);
        return {
            soundEnabled: parsed.soundEnabled === true,
            showAimGuide: parsed.showAimGuide !== false
        };
    } catch {
        return { ...defaultSettings };
    }
}

function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function syncSettingsUi() {
    soundToggle.checked = settings.soundEnabled;
    guideToggle.checked = settings.showAimGuide;

    aimBtn.setAttribute("aria-pressed", String(settings.showAimGuide));
    aimBtn.setAttribute("title", settings.showAimGuide ? "Aim Guide On" : "Aim Guide Off");
    aimBtn.textContent = settings.showAimGuide ? "🎯" : "🚫";

    volumeBtn.setAttribute("aria-pressed", String(settings.soundEnabled));
    volumeBtn.setAttribute("title", settings.soundEnabled ? "Sound On" : "Sound Off");
    volumeBtn.textContent = settings.soundEnabled ? "🔊" : "🔇";
}

function openSettings() {
    syncSettingsUi();
    settingsBackdrop.style.display = "block";
    settingsPanel.style.display = "block";
}

function closeSettings() {
    settingsBackdrop.style.display = "none";
    settingsPanel.style.display = "none";
}

function ensureAudioContext() {
    if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        audioContext = new AudioCtx();
    }
    if (audioContext.state === "suspended") {
        audioContext.resume();
    }
    return audioContext;
}

function playTone(type, options) {
    if (!settings.soundEnabled) return;
    const ctxAudio = ensureAudioContext();
    if (!ctxAudio) return;

    const now = ctxAudio.currentTime;
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(options.startFreq, now);
    if (options.endFreq !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.endFreq), now + options.duration);
    }
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(options.peak, now + options.attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + options.duration);
    osc.connect(gain);
    gain.connect(ctxAudio.destination);
    osc.start(now);
    osc.stop(now + options.duration + 0.02);
}

function playMatchBoomSound() {
    // Low-volume boom for successful armor match.
    playTone("sine", { startFreq: 180, endFreq: 72, attack: 0.01, duration: 0.26, peak: 0.05 });
}

function playCrashSound() {
    // Low-volume crash for a hit that does not create a match.
    playTone("square", { startFreq: 280, endFreq: 120, attack: 0.003, duration: 0.08, peak: 0.03 });
}

function playLaunchSound() {
    playTone("sawtooth", { startFreq: 260, endFreq: 140, attack: 0.01, duration: 0.18, peak: 0.08 });
}

function buildWebAppManifest() {
    const iconSvg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='#172033'/><path d='M26 96h66l30-30 42 30-42 30-30-30H26z' fill='#ffcf44'/><circle cx='52' cy='96' r='14' fill='#ffe9aa'/></svg>";
    const iconUrl = "data:image/svg+xml," + encodeURIComponent(iconSvg);
    const startUrl = new URL(location.pathname.split("/").pop() || "bubble-shooter.html", location.href).toString();
    const scopeUrl = new URL(".", location.href).toString();
    const manifest = {
        name: "Missile Shooter",
        short_name: "Missiles",
        start_url: startUrl,
        scope: scopeUrl,
        display: "standalone",
        background_color: "#0b101a",
        theme_color: "#172033",
        description: "Armor-match missile shooter with bouncing trajectories and advancing drone formations.",
        icons: [
            { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
            { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    manifestLink.href = URL.createObjectURL(blob);
}

function updateInstallButton() {
    if (isStandaloneMode()) {
        installBtn.style.display = "none";
        return;
    }
    if (installPromptEvent) {
        installBtn.textContent = "📲";
        installBtn.title = "Install App";
        installBtn.style.display = "inline-flex";
        return;
    }
    if (isIosBrowser()) {
        installBtn.textContent = "🏠";
        installBtn.title = "Add to Home Screen";
        installBtn.style.display = "inline-flex";
        return;
    }
    installBtn.style.display = "none";
}

async function registerWebAppSupport() {
    buildWebAppManifest();
    if (!("serviceWorker" in navigator) || location.protocol === "file:") {
        updateInstallButton();
        return;
    }
    try {
        await navigator.serviceWorker.register("./service-worker.js");
    } catch (error) {
        console.warn("Service worker registration failed", error);
    }
    updateInstallButton();
}

function getRowHeight() {
    return R * 1.5;
}

function getBaseCeilingY() {
    return 40 - R;
}

function updateRoofHeight() {
    const roofLowerSteps = Math.floor((level - 1) / LEVELS_PER_ROOF_LOWER);
    ceilingY = getBaseCeilingY() + roofLowerSteps * getRowHeight() * ROOF_LOWER_STEP_ROWS;
}

function getViewportHeight() {
    if (window.visualViewport && Number.isFinite(window.visualViewport.height)) {
        return Math.floor(window.visualViewport.height);
    }
    return window.innerHeight;
}

function resizeCanvas() {
    const shellWidth = Math.min(window.innerWidth, 1200);
    appShell.style.width = shellWidth + "px";
    const dockHeight = controlDock.offsetHeight || 78;
    canvas.height = Math.max(320, getViewportHeight() - dockHeight);
    R = Math.floor(canvas.height / 40);
    canvas.width = shellWidth;
    COLS = Math.floor(canvas.width / (R * Math.sqrt(3)));
    updateRoofHeight();
    launcher.x = canvas.width / 2;
    launcher.y = canvas.height - Math.max(54, R * 3);
    mouseX = launcher.x;
    mouseY = launcher.y - 100;
}
window.addEventListener("resize", resizeCanvas);
if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", resizeCanvas);
}
resizeCanvas();
syncSettingsUi();

function key(q, r) {
    return q + "," + r;
}

function parseKey(k) {
    const comma = k.indexOf(",");
    return [Number(k.slice(0, comma)), Number(k.slice(comma + 1))];
}

function randomFrom(list) {
    return list[Math.floor(Math.random() * list.length)];
}

function neighbors(q, r) {
    return [[q + 1, r], [q - 1, r], [q, r + 1], [q, r - 1], [q + 1, r - 1], [q - 1, r + 1]];
}

function getPlayableRowSlots(row) {
    const slots = [];
    const startQ = -Math.floor((COLS + 4) / 2);
    for (let i = 0; i <= COLS + 4; i++) {
        const q = startQ + i;
        const p = hexToPixel(q, row);
        if (p.x >= R && p.x <= canvas.width - R) {
            slots.push(q);
        }
    }
    return slots;
}

function hexToPixel(q, r) {
    return { x: R * Math.sqrt(3) * (q + r / 2) + canvas.width / 2, y: R * 1.5 * r + ceilingY + R };
}

function pixelToHex(x, y) {
    x -= canvas.width / 2;
    y -= ceilingY + R;
    return hexRound((Math.sqrt(3) / 3 * x - y / 3) / R, (2 / 3 * y) / R);
}

function hexRound(q, r) {
    let x = q;
    let z = r;
    let y = -x - z;
    let rx = Math.round(x);
    let ry = Math.round(y);
    let rz = Math.round(z);
    let xd = Math.abs(rx - x);
    let yd = Math.abs(ry - y);
    let zd = Math.abs(rz - z);

    if (xd > yd && xd > zd) rx = -ry - rz;
    else if (yd > zd) ry = -rx - rz;
    else rz = -rx - ry;

    return [rx, rz];
}

function activeArmorIds() {
    const set = new Set();
    grid.forEach(v => set.add(v.armorId));
    return [...set];
}

function unlockedArmorList() {
    return ARMOR_TYPES.slice(0, unlockedArmorCount);
}

function armorFromId(id) {
    return ARMOR_TYPES.find(a => a.id === id) || ARMOR_TYPES[0];
}

function getArmorPools(source = "shot") {
    const unlocked = unlockedArmorList();
    if (unlocked.length === 0) {
        return { available: [ARMOR_TYPES[0]], active: [] };
    }

    let available = unlocked.filter(a => !clearedArmor.has(a.id));

    let active = activeArmorIds()
        .map(id => available.find(a => a.id === id))
        .filter(Boolean);
    if (active.length === 0 && available.length > 0) active = [...available];

    return { available, active };
}

function buildCeilingRowArmor(count) {
    const rowArmor = [];
    for (let i = 0; i < count; i++) rowArmor.push(randomArmor("ceiling"));

    if (count < 3) return rowArmor;

    const distinct = new Set(rowArmor.map(a => a.id));
    if (distinct.size > 1) return rowArmor;

    const pools = getArmorPools("ceiling");
    const diversityPool = pools.active.length > 0 && pools.active.length <= 2 ? pools.active : pools.available;
    if (diversityPool.length < 2) return rowArmor;

    const baseId = rowArmor[0].id;
    const alternatives = diversityPool.filter(a => a.id !== baseId);
    if (alternatives.length === 0) return rowArmor;

    const injectAt = Math.floor(Math.random() * count);
    rowArmor[injectAt] = randomFrom(alternatives);
    return rowArmor;
}

function randomArmor(source = "shot") {
    const pools = getArmorPools(source);
    const available = pools.available;
    const active = pools.active;

    if (available.length === 0) {
        const boardActive = activeArmorIds();
        return boardActive.length > 0 ? armorFromId(boardActive[0]) : ARMOR_TYPES[0];
    }

    if (source === "ceiling" && active.length > 0 && active.length <= 2) {
        return randomFrom(active);
    }

    let preferActiveChance = source === "ceiling" ? 0.55 : 0.8;
    if (active.length <= 2) preferActiveChance = source === "ceiling" ? 0.25 : 0.45;
    if (active.length === 0 || Math.random() > preferActiveChance) {
        return randomFrom(available);
    }

    return randomFrom(active);
}

function refreshQueuedMissileArmor() {
    if (currentMissile && clearedArmor.has(currentMissile.armorId)) {
        currentMissile = createMissile(randomArmor("shot"));
    }
    if (nextMissile && clearedArmor.has(nextMissile.armorId)) {
        nextMissile = createMissile(randomArmor("shot"));
    }
}

function getLinesToDropForActiveArmor() {
    const activeCount = activeArmorIds().length;
    const clampedActive = Math.max(1, Math.min(5, activeCount));
    return 6 - clampedActive;
}

function createMissile(armor) {
    return { x: launcher.x, y: launcher.y, vx: 0, vy: 0, armorId: armor.id, moving: false };
}

function initBoard() {
    grid.clear();
    for (let r = 0; r < START_ROWS; r++) {
        const rowSlots = getPlayableRowSlots(r);
        for (let i = 0; i < rowSlots.length; i++) {
            const q = rowSlots[i];
            if (Math.random() < 0.9) {
                const armor = unlockedArmorList();
                const pick = randomFrom(armor);
                grid.set(key(q, r), { armorId: pick.id });
            }
        }
    }
}

function injectUnlockedArmor(armor) {
    const topKeys = [];
    grid.forEach((v, k) => {
        const parts = parseKey(k);
        if (parts[1] === 0) topKeys.push(k);
    });

    if (topKeys.length > 0) {
        const picked = randomFrom(topKeys);
        grid.set(picked, { armorId: armor.id });
        return;
    }

    grid.set(key(0, 0), { armorId: armor.id });
}

function startNewGame() {
    resizeCanvas();
    initBoard();
    score = 0;
    combo = 0;
    clearedArmor = new Set();
    shotsFired = 0;
    unlockedArmorCount = BASE_ARMOR_COUNT;
    maxMissesForCycle = BASE_MISSES_PER_DROP;
    currentMissesLeft = maxMissesForCycle;
    dropShiftLeftNext = false;
    level = 1;
    updateRoofHeight();
    gameOver = false;
    win = false;
    shotMissile = null;
    pendingExplosion = null;
    currentMissile = createMissile(randomArmor("shot"));
    nextMissile = createMissile(randomArmor("shot"));
    uiOverlay.style.display = "none";
}

function fireMissile() {
    if (shotMissile || gameOver || win) return;
    let dx = mouseX - launcher.x;
    let dy = mouseY - launcher.y;
    const length = Math.hypot(dx, dy);
    if (dy > -10 || length < 0.001) return;

    dx /= length;
    dy /= length;
    currentMissile.vx = dx * SPEED;
    currentMissile.vy = dy * SPEED;
    currentMissile.moving = true;
    shotMissile = currentMissile;
    shotsFired++;
    updateLevelFromShots();
    playLaunchSound();

    currentMissile = createMissile(armorFromId(nextMissile.armorId));
    nextMissile = createMissile(randomArmor("shot"));
}

function findSegmentDroneCollision(startX, startY, endX, endY) {
    const dx = endX - startX;
    const dy = endY - startY;
    const segmentLengthSq = dx * dx + dy * dy;
    if (segmentLengthSq === 0) return null;

    const collisionDistance = getMissileCollisionRadius() + R * 0.95;
    const collisionDistanceSq = collisionDistance * collisionDistance;
    const xScale = R * Math.sqrt(3);
    const yScale = R * 1.5;
    const centerX = canvas.width / 2;
    const yOffset = ceilingY + R;
    let earliestHit = null;

    for (const [k] of grid) {
        const comma = k.indexOf(",");
        const q = Number(k.slice(0, comma));
        const r = Number(k.slice(comma + 1));
        const cx = xScale * (q + r / 2) + centerX;
        const cy = yScale * r + yOffset;
        const relX = startX - cx;
        const relY = startY - cy;
        const a = segmentLengthSq;
        const b = 2 * (relX * dx + relY * dy);
        const c = relX * relX + relY * relY - collisionDistanceSq;
        const discriminant = b * b - 4 * a * c;
        if (discriminant < 0) continue;

        const root = Math.sqrt(discriminant);
        const candidateTs = [(-b - root) / (2 * a), (-b + root) / (2 * a)];
        for (const t of candidateTs) {
            if (t < SHOT_EVENT_EPSILON || t > 1) continue;
            if (!earliestHit || t < earliestHit.t) {
                earliestHit = {
                    t,
                    x: startX + dx * t,
                    y: startY + dy * t
                };
            }
        }
    }

    return earliestHit;
}

function getNextMissileEvent(startX, startY, vx, vy, maxTime) {
    const missileRadius = getMissileCollisionRadius();
    const segmentEndX = startX + vx * maxTime;
    const segmentEndY = startY + vy * maxTime;
    let bestEvent = {
        type: "move",
        time: maxTime,
        x: segmentEndX,
        y: segmentEndY
    };

    const droneHit = findSegmentDroneCollision(startX, startY, segmentEndX, segmentEndY);
    if (droneHit) {
        const droneTime = maxTime * droneHit.t;
        if (droneTime < bestEvent.time) {
            bestEvent = {
                type: "drone",
                time: droneTime,
                x: droneHit.x,
                y: droneHit.y
            };
        }
    }

    if (vy < -SHOT_EVENT_EPSILON) {
        const ceilingTime = (ceilingY + missileRadius - startY) / vy;
        if (ceilingTime >= SHOT_EVENT_EPSILON && ceilingTime < bestEvent.time) {
            bestEvent = {
                type: "ceiling",
                time: ceilingTime,
                x: startX + vx * ceilingTime,
                y: ceilingY + missileRadius
            };
        }
    }

    if (vx > SHOT_EVENT_EPSILON) {
        const rightWallTime = (canvas.width - missileRadius - startX) / vx;
        if (rightWallTime >= SHOT_EVENT_EPSILON && rightWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: rightWallTime,
                x: canvas.width - missileRadius,
                y: startY + vy * rightWallTime
            };
        }
    } else if (vx < -SHOT_EVENT_EPSILON) {
        const leftWallTime = (missileRadius - startX) / vx;
        if (leftWallTime >= SHOT_EVENT_EPSILON && leftWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: leftWallTime,
                x: missileRadius,
                y: startY + vy * leftWallTime
            };
        }
    }

    return bestEvent;
}

function advanceShotMissile(frameScale) {
    const missileRadius = getMissileCollisionRadius();
    let remainingTime = frameScale;
    let handledEvents = 0;

    while (shotMissile && shotMissile.moving && remainingTime > SHOT_EVENT_EPSILON && handledEvents < MAX_SHOT_EVENTS_PER_FRAME) {
        handledEvents++;
        const event = getNextMissileEvent(shotMissile.x, shotMissile.y, shotMissile.vx, shotMissile.vy, remainingTime);

        shotMissile.x = event.x;
        shotMissile.y = event.y;

        if (event.type === "move") {
            break;
        }

        if (event.type === "wall") {
            shotMissile.vx *= -1;
            shotMissile.x = Math.min(
                canvas.width - missileRadius,
                Math.max(missileRadius, shotMissile.x + Math.sign(shotMissile.vx) * SHOT_POSITION_EPSILON)
            );
            remainingTime -= event.time;
            continue;
        }

        snapMissile();
        return;
    }
}

function drawTrajectoryPath(startX, startY, vx, vy, maxTime) {
    const missileRadius = getMissileCollisionRadius();
    let x = startX;
    let y = startY;
    let currentVx = vx;
    let currentVy = vy;
    let remainingTime = maxTime;
    let handledEvents = 0;

    ctx.beginPath();
    ctx.moveTo(startX, startY);

    while (remainingTime > SHOT_EVENT_EPSILON && handledEvents < MAX_TRAJECTORY_EVENTS) {
        handledEvents++;
        const event = getNextMissileEvent(x, y, currentVx, currentVy, remainingTime);
        ctx.lineTo(event.x, event.y);

        if (event.type === "move" || event.type === "drone" || event.type === "ceiling") {
            break;
        }

        remainingTime -= event.time;
        currentVx *= -1;
        x = Math.min(canvas.width - missileRadius, Math.max(missileRadius, event.x + Math.sign(currentVx) * SHOT_POSITION_EPSILON));
        y = event.y;
    }
}

function updateLevelFromShots() {
    const targetLevel = 1 + Math.floor(shotsFired / SHOTS_PER_LEVEL);
    if (targetLevel <= level) return;

    while (level < targetLevel) {
        level++;

        const targetUnlockedCount = Math.min(BASE_ARMOR_COUNT + Math.floor((level - 1) / 4), ARMOR_TYPES.length);
        if (targetUnlockedCount > unlockedArmorCount) {
            unlockedArmorCount = targetUnlockedCount;
            injectUnlockedArmor(ARMOR_TYPES[unlockedArmorCount - 1]);
        }

        maxMissesForCycle = Math.max(BASE_MISSES_PER_DROP - Math.floor((level - 1) / 3), MIN_MISSES_PER_DROP);
        currentMissesLeft = Math.min(currentMissesLeft, maxMissesForCycle);
        updateRoofHeight();
    }
}

function findBestSnapCell(x, y) {
    const base = pixelToHex(x, y);
    const startQ = base[0];
    const startR = base[1];
    const startKey = key(startQ, startR);
    if (!grid.has(startKey)) return [startQ, startR];

    const visited = new Set([startKey]);
    let frontier = [[startQ, startR]];
    let candidates = [];

    for (let depth = 0; depth < 2; depth++) {
        const nextFrontier = [];
        for (let i = 0; i < frontier.length; i++) {
            const node = frontier[i];
            const near = neighbors(node[0], node[1]);
            for (let j = 0; j < near.length; j++) {
                const nq = near[j][0];
                const nr = near[j][1];
                const nk = key(nq, nr);
                if (visited.has(nk)) continue;
                visited.add(nk);

                if (!grid.has(nk)) {
                    const p = hexToPixel(nq, nr);
                    if (p.x >= R && p.x <= canvas.width - R) {
                        candidates.push([nq, nr]);
                    }
                } else {
                    nextFrontier.push([nq, nr]);
                }
            }
        }
        if (candidates.length > 0) break;
        frontier = nextFrontier;
        if (frontier.length === 0) break;
    }

    if (candidates.length === 0) return null;

    let best = candidates[0];
    let bestDist = Infinity;
    for (let i = 0; i < candidates.length; i++) {
        const p = hexToPixel(candidates[i][0], candidates[i][1]);
        const d = Math.hypot(x - p.x, y - p.y);
        if (d < bestDist) {
            bestDist = d;
            best = candidates[i];
        }
    }
    return best;
}

function snapMissile() {
    if (!shotMissile) return;
    const snapped = findBestSnapCell(shotMissile.x, shotMissile.y);
    if (!snapped) {
        shotMissile = null;
        checkGameOver();
        return;
    }

    const q = snapped[0];
    const r = snapped[1];
    grid.set(key(q, r), { armorId: shotMissile.armorId });

    const match = findMatches(q, r);
    if (match.length >= 3) {
        playMatchBoomSound();
        pendingExplosion = match;
        explosionTimer = 8;
        combo++;
    } else {
        playCrashSound();
        combo = 0;
        islandTimer = 8;
        currentMissesLeft--;
        if (currentMissesLeft <= 0) {
            const linesToDrop = getLinesToDropForActiveArmor();
            for (let i = 0; i < linesToDrop; i++) {
                dropCeiling();
            }
            currentMissesLeft = maxMissesForCycle;
        }
    }

    shotMissile = null;
    checkGameOver();
}

function findMatches(q, r) {
    if (!grid.has(key(q, r))) return [];
    const armorId = grid.get(key(q, r)).armorId;
    const stack = [[q, r]];
    const visited = new Set();
    const match = [];

    while (stack.length) {
        const node = stack.pop();
        const cq = node[0];
        const cr = node[1];
        const k = key(cq, cr);
        if (visited.has(k)) continue;
        visited.add(k);

        const cell = grid.get(k);
        if (!cell || cell.armorId !== armorId) continue;

        match.push([cq, cr]);
        const near = neighbors(cq, cr);
        for (let i = 0; i < near.length; i++) stack.push(near[i]);
    }

    return match;
}

function spawnExplosionCloud(x, y, armorId) {
    const armor = armorFromId(armorId);
    const puffCount = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < puffCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.8 + Math.random() * 2.4;
        explosionClouds.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.3,
            r: R * (0.18 + Math.random() * 0.28),
            life: 24 + Math.floor(Math.random() * 18),
            maxLife: 24 + Math.floor(Math.random() * 18),
            color: armor.accent,
            glow: armor.color
        });
    }
}

function updateExplosionClouds(frameScale) {
    const velocityDamping = Math.pow(0.96, frameScale);
    const radiusGrowth = Math.pow(1.015, frameScale);
    const gravityStep = 0.02 * frameScale;
    const radiusLimit = R * 1.2;

    for (let i = explosionClouds.length - 1; i >= 0; i--) {
        const p = explosionClouds[i];
        p.x += p.vx * frameScale;
        p.y += p.vy * frameScale;
        p.vx *= velocityDamping;
        p.vy = p.vy * velocityDamping - gravityStep;
        p.r *= radiusGrowth;
        p.life -= frameScale;
        if (p.life <= 0 || p.r > radiusLimit) {
            explosionClouds.splice(i, 1);
        }
    }
}

function drawExplosionClouds() {
    for (let i = 0; i < explosionClouds.length; i++) {
        const p = explosionClouds[i];
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha * 0.55;
        ctx.shadowColor = p.glow;
        ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function explodeMatch() {
    if (!pendingExplosion) return;
    const prevArmor = activeArmorIds();
    const comboMultiplier = Math.max(1, combo);

    pendingExplosion.forEach(pair => {
        const k = key(pair[0], pair[1]);
        const cell = grid.get(k);
        const pos = hexToPixel(pair[0], pair[1]);
        if (cell) {
            spawnExplosionCloud(pos.x, pos.y, cell.armorId);
        }
        grid.delete(key(pair[0], pair[1]));
        score += MATCH_SCORE * comboMultiplier;
    });

    pendingExplosion = null;
    islandTimer = 15;
    checkArmorClears(prevArmor);
}

function removeFloating() {
    const visited = new Set();
    const stack = [];

    grid.forEach((v, k) => {
        const parts = parseKey(k);
        if (parts[1] === 0) stack.push([parts[0], parts[1]]);
    });

    while (stack.length) {
        const node = stack.pop();
        const q = node[0];
        const r = node[1];
        const k = key(q, r);
        if (visited.has(k)) continue;
        visited.add(k);

        const near = neighbors(q, r);
        for (let i = 0; i < near.length; i++) {
            if (grid.has(key(near[i][0], near[i][1]))) stack.push(near[i]);
        }
    }

    const prevArmor = activeArmorIds();
    grid.forEach((v, k) => {
        if (!visited.has(k)) {
            grid.delete(k);
            score += FLOATING_SCORE * Math.max(1, combo);
        }
    });

    checkArmorClears(prevArmor);
    checkWin();
}

function checkArmorClears(previousArmorList) {
    const currentSet = new Set(activeArmorIds());
    let clearedCount = 0;

    for (let i = 0; i < previousArmorList.length; i++) {
        const id = previousArmorList[i];
        if (!currentSet.has(id)) {
            clearedArmor.add(id);
            clearedCount++;
        }
    }

    if (clearedCount > 0) {
        score += ARMOR_CLEAR_BONUS * clearedCount;
        refreshQueuedMissileArmor();
    }
}

function dropCeiling() {
    const newGrid = new Map();
    const qShift = dropShiftLeftNext ? -1 : 0;

    grid.forEach((v, k) => {
        const parts = parseKey(k);
        const q = parts[0];
        const r = parts[1];
        const nextQ = q + qShift;
        const p = hexToPixel(nextQ, r + 1);
        if (p.x >= R && p.x <= canvas.width - R) {
            newGrid.set(key(nextQ, r + 1), v);
        }
    });

    const openSlots = getPlayableRowSlots(0);

    const rowArmor = buildCeilingRowArmor(openSlots.length);
    for (let i = 0; i < openSlots.length; i++) {
        newGrid.set(key(openSlots[i], 0), { armorId: rowArmor[i].id });
    }

    grid = newGrid;
    dropShiftLeftNext = !dropShiftLeftNext;
}

function showOverlay(title) {
    uiTitle.innerText = title;
    uiScore.innerText = "Score: " + score;
    uiOverlay.style.display = "block";
}

function checkGameOver() {
    const yScale = R * 1.5;
    const yOffset = ceilingY + R;
    const gameOverLine = launcher.y - R * 2;
    for (const [k] of grid) {
        const comma = k.indexOf(",");
        const r = Number(k.slice(comma + 1));
        const y = yScale * r + yOffset;
        if (y > gameOverLine) {
            gameOver = true;
            showOverlay("Mission Failed");
            break;
        }
    }
}

function checkWin() {
    if (grid.size === 0) {
        score += BOARD_CLEAR_BONUS;
        win = true;
        showOverlay("Sector Cleared");
    }
}

function shareScore(platform) {
    const text = `Missile Shooter score: ${score} points, level ${level}. Match armor classes and beat this run.`;
    const emoji = "🚀🛡️🤖";
    const url = encodeURIComponent(location.href);
    let shareUrl = "";

    if (platform === "copy") {
        const copyText = `${text} ${emoji}\n${location.href}`;
        navigator.clipboard.writeText(copyText).then(() => {
            alert("Score copied to clipboard!");
        }).catch(err => {
            console.error("Failed to copy:", err);
            alert("Failed to copy to clipboard");
        });
        return;
    }

    if (platform === "x") {
        shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text + " " + emoji)}&url=${url}`;
    }
    if (platform === "wa") {
        shareUrl = `https://wa.me/?text=${encodeURIComponent(location.href + "\n" + text)}`;
    }
    if (platform === "tg") {
        shareUrl = `https://t.me/share/url?url=${url}&text=${encodeURIComponent(text + " " + emoji)}`;
    }

    window.open(shareUrl, "_blank");
}

function update(deltaSeconds) {
    if (gameOver || win) return;

    const frameScale = deltaSeconds * REFERENCE_FPS;

    updateExplosionClouds(frameScale);

    if (explosionTimer > 0) {
        explosionTimer = Math.max(0, explosionTimer - frameScale);
        if (explosionTimer === 0) explodeMatch();
    }
    if (islandTimer > 0) {
        islandTimer = Math.max(0, islandTimer - frameScale);
        if (islandTimer === 0) removeFloating();
    }

    if (shotMissile && shotMissile.moving) {
        advanceShotMissile(frameScale);
    }
}

function drawTrajectory() {
    if (!settings.showAimGuide) return;
    if (shotMissile || gameOver || win || (isTouchDevice && !touchAimActive)) return;

    let dx = mouseX - launcher.x;
    let dy = mouseY - launcher.y;
    if (dy > -10) return;

    let angle = Math.atan2(dy, dx);
    let vx = Math.cos(angle) * SPEED;
    let vy = Math.sin(angle) * SPEED;

    ctx.setLineDash([8, 12]);
    ctx.strokeStyle = "rgba(255, 225, 140, 0.5)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    drawTrajectoryPath(launcher.x, launcher.y, vx, vy, 60 * 2.5);

    ctx.stroke();
    ctx.setLineDash([]);
}

function drawDrone(x, y, armorId) {
    const armor = armorFromId(armorId);
    ctx.save();

    const bodyGrad = ctx.createRadialGradient(x - R * 0.35, y - R * 0.4, R * 0.25, x, y, R * 1.1);
    bodyGrad.addColorStop(0, armor.accent);
    bodyGrad.addColorStop(0.65, armor.color);
    bodyGrad.addColorStop(1, "#111827");

    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(x, y, R * 0.95, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, R * 0.65, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = "rgba(5, 10, 18, 0.55)";
    ctx.beginPath();
    ctx.arc(x, y, R * 0.28, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawMissileSprite(targetCtx, x, y, armorId, scale = 1) {
    const armor = armorFromId(armorId);
    const nose = 12 * scale;
    const body = 18 * scale;
    const halfH = 6 * scale;

    targetCtx.save();
    targetCtx.translate(x, y);

    targetCtx.beginPath();
    targetCtx.moveTo(-body * 0.5, -halfH);
    targetCtx.lineTo(body * 0.2, -halfH);
    targetCtx.lineTo(body * 0.5 + nose, 0);
    targetCtx.lineTo(body * 0.2, halfH);
    targetCtx.lineTo(-body * 0.5, halfH);
    targetCtx.closePath();

    const missileGrad = targetCtx.createLinearGradient(-body * 0.5, 0, body * 0.5 + nose, 0);
    missileGrad.addColorStop(0, "#22304f");
    missileGrad.addColorStop(0.55, armor.color);
    missileGrad.addColorStop(1, armor.accent);
    targetCtx.fillStyle = missileGrad;
    targetCtx.fill();

    targetCtx.strokeStyle = "rgba(255,255,255,0.35)";
    targetCtx.lineWidth = 1.3 * scale;
    targetCtx.stroke();

    targetCtx.fillStyle = "#111";
    targetCtx.fillRect(-body * 0.2, -halfH * 0.3, body * 0.22, halfH * 0.6);

    targetCtx.fillStyle = "#ff8655";
    targetCtx.beginPath();
    targetCtx.moveTo(-body * 0.5, -halfH * 0.65);
    targetCtx.lineTo(-body * 0.95, 0);
    targetCtx.lineTo(-body * 0.5, halfH * 0.65);
    targetCtx.closePath();
    targetCtx.fill();

    targetCtx.restore();
}

function drawGrid() {
    const xScale = R * Math.sqrt(3);
    const yScale = R * 1.5;
    const centerX = canvas.width / 2;
    const yOffset = ceilingY + R;

    for (const [k, v] of grid) {
        const comma = k.indexOf(",");
        const q = Number(k.slice(0, comma));
        const r = Number(k.slice(comma + 1));
        const x = xScale * (q + r / 2) + centerX;
        const y = yScale * r + yOffset;
        drawDrone(x, y, v.armorId);
    }
}

function drawLauncher() {
    drawTrajectory();

    let aimAngle = Math.atan2(mouseY - launcher.y, mouseX - launcher.x);
    if (mouseY > launcher.y - 10) {
        aimAngle = -Math.PI / 2;
    }

    ctx.save();
    ctx.translate(launcher.x, launcher.y + 8);
    ctx.fillStyle = "#1a243d";
    ctx.strokeStyle = "#ffd97a";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-28, -14, 56, 24, 8);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(launcher.x, launcher.y - 6);
    ctx.rotate(aimAngle);
    drawMissileSprite(ctx, 0, 0, currentMissile.armorId, Math.max(1, R / 16));
    ctx.restore();

    if (shotMissile) {
        const angle = Math.atan2(shotMissile.vy, shotMissile.vx);
        ctx.save();
        ctx.translate(shotMissile.x, shotMissile.y);
        ctx.rotate(angle);
        drawMissileSprite(ctx, 0, 0, shotMissile.armorId, Math.max(0.95, R / 18));
        ctx.restore();
    }

    const startX = 22;
    const startY = canvas.height - 24;
    const gap = 22;
    for (let i = 0; i < currentMissesLeft; i++) {
        const x = startX + i * gap;
        ctx.save();
        ctx.translate(x, startY);
        ctx.rotate(-Math.PI / 2);
        ctx.globalAlpha = 0.9;
        drawMissileSprite(ctx, 0, 0, "ember", 0.58);
        ctx.restore();
    }
}

function drawNextMissilePreview() {
    nextMissileCtx.clearRect(0, 0, nextMissileCanvas.width, nextMissileCanvas.height);
    if (!nextMissile) return;
    drawMissileSprite(nextMissileCtx, nextMissileCanvas.width / 2, nextMissileCanvas.height / 2, nextMissile.armorId, 1.1);
}

function drawScore() {
    ctx.save();
    ctx.font = "bold 34px \"Trebuchet MS\", sans-serif";
    ctx.textAlign = "right";
    const sx = canvas.width - 20;
    const sy = canvas.height - 20;

    ctx.shadowColor = "#ffcf44";
    ctx.shadowBlur = 26;
    ctx.fillStyle = "rgba(255, 207, 68, 0.48)";
    ctx.fillText(score, sx, sy);

    ctx.shadowBlur = 10;
    ctx.fillStyle = "rgba(255, 242, 200, 0.95)";
    ctx.fillText(score, sx, sy);

    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(score, sx, sy);
    ctx.restore();
}

function drawCeiling() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
    ctx.fillRect(0, 0, canvas.width, ceilingY - 1);

    ctx.save();
    ctx.shadowColor = "#ffcf44";
    ctx.shadowBlur = 9;
    ctx.strokeStyle = "#ffcf44";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ceilingY - 1);
    ctx.lineTo(canvas.width, ceilingY - 1);
    ctx.stroke();
    ctx.restore();

    ctx.font = "bold 13px sans-serif";
    ctx.fillStyle = "#ffcf44";
    ctx.textAlign = "left";
    ctx.fillText("LEVEL " + level, 10, ceilingY - 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawExplosionClouds();
    drawCeiling();
    drawLauncher();
    drawScore();
    drawNextMissilePreview();
}

let lastFrameTime = performance.now();

function loop(timestamp) {
    const deltaSeconds = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
    lastFrameTime = timestamp;
    update(deltaSeconds);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

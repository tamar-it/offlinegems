function getMissileScale() {
    // Match the scale used when drawing the moving missile.
    return Math.max(0.95, game.R / 18);
}

function getMissileCollisionRadius() {
    // Use the missile body half-width so it can pass through gaps as wide as its own body.
    return (18 * getMissileScale()) * 0.5;
}

function distancePointToSegmentSquared(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    if (dx === 0 && dy === 0) {
        const sx = px - x1;
        const sy = py - y1;
        return sx * sx + sy * sy;
    }

    const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
    const cx = x1 + t * dx;
    const cy = y1 + t * dy;
    const ox = px - cx;
    const oy = py - cy;
    return ox * ox + oy * oy;
}

function isStandaloneMode() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function isIosBrowser() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function loadSettings() {
    try {
        const raw = localStorage.getItem(game.SETTINGS_KEY);
        if (!raw) return { ...game.defaultSettings };
        const parsed = JSON.parse(raw);
        return {
            soundEnabled: parsed.soundEnabled === true,
            showAimGuide: parsed.showAimGuide !== false
        };
    } catch {
        return { ...game.defaultSettings };
    }
}

function saveSettings() {
    localStorage.setItem(game.SETTINGS_KEY, JSON.stringify(game.settings));
}

    volumeBtn.textContent = game.settings.soundEnabled ? "🔊" : "🔇";
}

function ensureAudioContext() {
    if (!game.audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        game.audioContext = new AudioCtx();
    }
    if (game.audioContext.state === "suspended") {
        game.audioContext.resume();
    }
    return game.audioContext;
}

function playTone(type, options) {
    if (!game.settings) {
        game.settings = { ...game.defaultSettings };
    }
    if (!game.settings.soundEnabled) return;
    const ctxAudio = ensureAudioContext();
    if (!ctxAudio) return;

    const now = ctxAudio.currentTime;
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(options.startFreq, now);
    if (options.endFreq !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, options.endFreq), now + options.duration);
    }
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(options.peak, now + options.attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + options.duration);
    osc.connect(gain);
    gain.connect(ctxAudio.destination);
    osc.start(now);
    osc.stop(now + options.duration + 0.02);
}

function playMatchBoomSound() {
    // Low-volume boom for successful armor match.
    playTone("sine", { startFreq: 180, endFreq: 72, attack: 0.01, duration: 0.26, peak: 0.05 });

function playCrashSound() {
    // Low-volume crash for a hit that does not create a match.
    playTone("square", { startFreq: 280, endFreq: 120, attack: 0.003, duration: 0.08, peak: 0.03 });
}

function buildWebAppManifest() {
    const iconSvg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='#172033'/><path d='M26 96h66l30-30 42 30-42 30-30-30H26z' fill='#ffcf44'/><circle cx='52' cy='96' r='14' fill='#ffe9aa'/></svg>";
    const iconUrl = "data:image/svg+xml," + encodeURIComponent(iconSvg);
    const startUrl = new URL(location.pathname.split("/").pop() || "bubble-shooter.html", location.href).toString();
    const scopeUrl = new URL(".", location.href).toString();
    const manifest = {
        name: "Missile Shooter",
        short_name: "Missiles",
        start_url: startUrl,
        scope: scopeUrl,
        display: "standalone",
        background_color: "#0b101a",
        theme_color: "#172033",
        description: "Armor-match missile shooter with bouncing trajectories and advancing drone formations.",
        icons: [
            { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
            { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    manifestLink.href = URL.createObjectURL(blob);
}

function getRowHeight() {

}

function getBaseCeilingY() {
    return 40 - game.R;
}

function updateRoofHeight() {
    const roofLowerSteps = Math.floor((game.level - 1) / game.LEVELS_PER_ROOF_LOWER);
    game.ceilingY = getBaseCeilingY() + roofLowerSteps * getRowHeight() * game.ROOF_LOWER_STEP_ROWS;

function resizeCanvas() {
    const shellWidth = Math.min(window.innerWidth, 1200);
    appShell.style.width = shellWidth + "px";

    canvas.height = Math.max(320, window.innerHeight - dockHeight);

    canvas.width = shellWidth;

    updateRoofHeight();
    game.launcher.x = canvas.width / 2;
    game.launcher.y = canvas.height - Math.max(54, game.R * 3);

function key(q, r) {
    return q + "," + r;
}

function neighbors(q, r) {
    return [[q + 1, r], [q - 1, r], [q, r + 1], [q, r - 1], [q + 1, r - 1], [q - 1, r + 1]];
}

function hexToPixel(q, r) {
    return { x: game.R * Math.sqrt(3) * (q + r / 2) + canvas.width / 2, y: game.R * 1.5 * r + game.ceilingY + game.R };
}

function pixelToHex(x, y) {
    x -= canvas.width / 2;
    y -= game.ceilingY + game.R;
    return hexRound((Math.sqrt(3) / 3 * x - y / 3) / game.R, (2 / 3 * y) / game.R);
}

function hexRound(q, r) {
    let x = q;
    let z = r;
    let y = -x - z;
    let rx = Math.round(x);
    let ry = Math.round(y);
    let rz = Math.round(z);
    let xd = Math.abs(rx - x);
    let yd = Math.abs(ry - y);
    let zd = Math.abs(rz - z);

    if (xd > yd && xd > zd) rx = -ry - rz;
    else if (yd > zd) ry = -rx - rz;
    else rz = -rx - ry;

    return [rx, rz];
}

function activeArmorIds() {
    const set = new Set();
    game.grid.forEach(v => set.add(v.armorId));
    return [...set];
}

function unlockedArmorList() {
    return game.ARMOR_TYPES.slice(0, game.unlockedArmorCount);
}

function armorFromId(id) {
    return game.ARMOR_TYPES.find(a => a.id === id) || game.ARMOR_TYPES[0];
}

function randomArmor(source = "shot") {
    const activeIds = activeArmorIds();
    const unlocked = unlockedArmorList();
    const available = unlocked.filter(a => !game.clearedArmor.has(a.id));
    if (available.length === 0) return game.ARMOR_TYPES[0];

    let preferActiveChance = source === "ceiling" ? 0.55 : 0.8;
    if (activeIds.length <= 2) preferActiveChance = source === "ceiling" ? 0.25 : 0.45;
    if (activeIds.length === 0 || Math.random() > preferActiveChance) {
        return available[Math.floor(Math.random() * available.length)];
    }

    const id = activeIds[Math.floor(Math.random() * activeIds.length)];
    return armorFromId(id);
}

function createMissile(armor) {
    return { x: game.launcher.x, y: game.launcher.y, vx: 0, vy: 0, armorId: armor.id, moving: false };
}

function initBoard() {
    game.grid.clear();
    for (let r = 0; r < game.START_ROWS; r++) {
        const startQ = -Math.floor((game.COLS + 4) / 2);
        for (let i = 0; i <= game.COLS + 4; i++) {
            const q = startQ + i;
            const p = hexToPixel(q, r);
            if (p.x >= game.R && p.x <= canvas.width - game.R && Math.random() < 0.9) {
                const armor = unlockedArmorList();
                const pick = armor[Math.floor(Math.random() * armor.length)];
                game.grid.set(key(q, r), { armorId: pick.id });
            }
        }
    }
}

function injectUnlockedArmor(armor) {
    const topKeys = [];
    game.grid.forEach((v, k) => {
        const parts = k.split(",").map(Number);
        if (parts[1] === 0) topKeys.push(k);
    });

    if (topKeys.length > 0) {
        const picked = topKeys[Math.floor(Math.random() * topKeys.length)];
        game.grid.set(picked, { armorId: armor.id });
        return;
    }

    game.grid.set(key(0, 0), { armorId: armor.id });
}

game.startNewGame = function() {

function fireMissile() {
    if (game.shotMissile || game.gameOver || game.win) return;
    let dx = game.mouseX - game.launcher.x;
    let dy = game.mouseY - game.launcher.y;
    const length = Math.hypot(dx, dy);
    if (dy > -10 || length < 0.001) return;

    dx /= length;
    dy /= length;
    game.currentMissile.vx = dx * game.SPEED;
    game.currentMissile.vy = dy * game.SPEED;
    game.currentMissile.moving = true;
    game.shotMissile = game.currentMissile;
    game.shotsFired++;
    updateLevelFromShots();
    playLaunchSound();

    game.currentMissile = createMissile(armorFromId(game.nextMissile.armorId));
    game.nextMissile = createMissile(randomArmor("shot"));
}

function findSegmentDroneCollision(startX, startY, endX, endY) {
    const dx = endX - startX;
    const dy = endY - startY;
    const segmentLengthSq = dx * dx + dy * dy;
    if (segmentLengthSq === 0) return null;

    const collisionDistance = getMissileCollisionRadius() + game.R * 0.95 - 1;
    const collisionDistanceSq = collisionDistance * collisionDistance;
    let earliestHit = null;

    for (const [k] of game.grid) {
        const [q, r] = k.split(",").map(Number);
        const center = hexToPixel(q, r);
        const relX = startX - center.x;
        const relY = startY - center.y;
        const a = segmentLengthSq;
        const b = 2 * (relX * dx + relY * dy);
        const c = relX * relX + relY * relY - collisionDistanceSq;
        const discriminant = b * b - 4 * a * c;
        if (discriminant < 0) continue;

        const root = Math.sqrt(discriminant);
        const candidateTs = [(-b - root) / (2 * a), (-b + root) / (2 * a)];
        for (const t of candidateTs) {
            if (t < game.SHOT_EVENT_EPSILON || t > 1) continue;
            if (!earliestHit || t < earliestHit.t) {
                earliestHit = {
                    t,
                    x: startX + dx * t,
                    y: startY + dy * t
                };
            }
        }
    }

    return earliestHit;
}

function getNextMissileEvent(startX, startY, vx, vy, maxTime) {
    const missileRadius = getMissileCollisionRadius();
    const segmentEndX = startX + vx * maxTime;
    const segmentEndY = startY + vy * maxTime;
    let bestEvent = {
        type: "move",
        time: maxTime,
        x: segmentEndX,
        y: segmentEndY
    };

    const droneHit = findSegmentDroneCollision(startX, startY, segmentEndX, segmentEndY);
    if (droneHit) {
        const droneTime = maxTime * droneHit.t;
        if (droneTime < bestEvent.time) {
            bestEvent = {
                type: "drone",
                time: droneTime,
                x: droneHit.x,
                y: droneHit.y
            };
        }
    }

    if (vy < -game.SHOT_EVENT_EPSILON) {
        const ceilingTime = (game.ceilingY + missileRadius - startY) / vy;
        if (ceilingTime >= game.SHOT_EVENT_EPSILON && ceilingTime < bestEvent.time) {
            bestEvent = {
                type: "ceiling",
                time: ceilingTime,
                x: startX + vx * ceilingTime,
                y: game.ceilingY + missileRadius
            };
        }
    }

    if (vx > game.SHOT_EVENT_EPSILON) {
        const rightWallTime = (canvas.width - missileRadius - startX) / vx;
        if (rightWallTime >= game.SHOT_EVENT_EPSILON && rightWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: rightWallTime,
                x: canvas.width - missileRadius,
                y: startY + vy * rightWallTime
            };
        }
    } else if (vx < -game.SHOT_EVENT_EPSILON) {
        const leftWallTime = (missileRadius - startX) / vx;
        if (leftWallTime >= game.SHOT_EVENT_EPSILON && leftWallTime < bestEvent.time) {
            bestEvent = {
                type: "wall",
                time: leftWallTime,
                x: missileRadius,
                y: startY + vy * leftWallTime
            };
        }
    }

    return bestEvent;
}

function advanceShotMissile(frameScale) {
    const missileRadius = getMissileCollisionRadius();
    let remainingTime = frameScale;
    let handledEvents = 0;

    while (game.shotMissile && game.shotMissile.moving && remainingTime > game.SHOT_EVENT_EPSILON && handledEvents < game.MAX_SHOT_EVENTS_PER_FRAME) {
        handledEvents++;
        const event = getNextMissileEvent(game.shotMissile.x, game.shotMissile.y, game.shotMissile.vx, game.shotMissile.vy, remainingTime);

        game.shotMissile.x = event.x;
        game.shotMissile.y = event.y;

        if (event.type === "move") {
            break;
        }

        if (event.type === "wall") {
            game.shotMissile.vx *= -1;
            game.shotMissile.x = Math.min(
                canvas.width - missileRadius,
                Math.max(missileRadius, game.shotMissile.x + Math.sign(game.shotMissile.vx) * game.SHOT_POSITION_EPSILON)
            );
            remainingTime -= event.time;
            continue;
        }

        snapMissile();
        return;
    }
}

function traceMissilePath(startX, startY, vx, vy, maxTime) {
    const missileRadius = getMissileCollisionRadius();
    const points = [{ x: startX, y: startY }];
    let x = startX;
    let y = startY;
    let currentVx = vx;
    let currentVy = vy;
    let remainingTime = maxTime;
    let handledEvents = 0;

    while (remainingTime > game.SHOT_EVENT_EPSILON && handledEvents < game.MAX_TRAJECTORY_EVENTS) {
        handledEvents++;
        const event = getNextMissileEvent(x, y, currentVx, currentVy, remainingTime);
        points.push({ x: event.x, y: event.y });

        if (event.type === "move" || event.type === "drone" || event.type === "ceiling") {
            break;
        }

        remainingTime -= event.time;
        currentVx *= -1;
        x = Math.min(canvas.width - missileRadius, Math.max(missileRadius, event.x + Math.sign(currentVx) * game.SHOT_POSITION_EPSILON));
        y = event.y;
    }

    return points;
}

function updateLevelFromShots() {
    const targetLevel = 1 + Math.floor(game.shotsFired / game.SHOTS_PER_LEVEL);
    if (targetLevel <= game.level) return;

    while (game.level < targetLevel) {
        game.level++;

        const targetUnlockedCount = Math.min(game.BASE_ARMOR_COUNT + Math.floor((game.level - 1) / 4), game.ARMOR_TYPES.length);
        if (targetUnlockedCount > game.unlockedArmorCount) {
            game.unlockedArmorCount = targetUnlockedCount;
            injectUnlockedArmor(game.ARMOR_TYPES[game.unlockedArmorCount - 1]);
        }

        game.maxMissesForCycle = Math.max(game.BASE_MISSES_PER_DROP - Math.floor((game.level - 1) / 3), game.MIN_MISSES_PER_DROP);
        game.currentMissesLeft = Math.min(game.currentMissesLeft, game.maxMissesForCycle);
        updateRoofHeight();
    }
}

function findBestSnapCell(x, y) {
    const base = pixelToHex(x, y);
    const startQ = base[0];
    const startR = base[1];
    const startKey = key(startQ, startR);
    if (!game.grid.has(startKey)) return [startQ, startR];

    const visited = new Set([startKey]);
    let frontier = [[startQ, startR]];
    let candidates = [];

    for (let depth = 0; depth < 2; depth++) {
        const nextFrontier = [];
        for (let i = 0; i < frontier.length; i++) {
            const node = frontier[i];
            const near = neighbors(node[0], node[1]);
            for (let j = 0; j < near.length; j++) {
                const nq = near[j][0];
                const nr = near[j][1];
                const nk = key(nq, nr);
                if (visited.has(nk)) continue;
                visited.add(nk);

                if (!game.grid.has(nk)) {
                    const p = hexToPixel(nq, nr);
                    if (p.x >= game.R && p.x <= canvas.width - game.R) {
                        candidates.push([nq, nr]);
                    }
                } else {
                    nextFrontier.push([nq, nr]);
                }
            }
        }
        if (candidates.length > 0) break;
        frontier = nextFrontier;
        if (frontier.length === 0) break;
    }

    if (candidates.length === 0) return null;

    let best = candidates[0];
    let bestDist = Infinity;
    for (let i = 0; i < candidates.length; i++) {
        const p = hexToPixel(candidates[i][0], candidates[i][1]);
        const d = Math.hypot(x - p.x, y - p.y);
        if (d < bestDist) {
            bestDist = d;
            best = candidates[i];
        }
    }
    return best;
}

function snapMissile() {
    if (!game.shotMissile) return;
    const snapped = findBestSnapCell(game.shotMissile.x, game.shotMissile.y);
    if (!snapped) {
        game.shotMissile = null;
        checkGameOver();
        return;
    }

    const q = snapped[0];
    const r = snapped[1];
    game.grid.set(key(q, r), { armorId: game.shotMissile.armorId });

    const match = findMatches(q, r);
    if (match.length >= 3) {
        playMatchBoomSound();
        game.pendingExplosion = match;
        game.explosionTimer = 8;
        game.combo++;
    } else {
        playCrashSound();
        game.combo = 0;
        game.islandTimer = 8;
        game.currentMissesLeft--;
        if (game.currentMissesLeft <= 0) {
            const linesToDrop = game.level >= 8 ? 2 : 1;
            for (let i = 0; i < linesToDrop; i++) {
                dropCeiling();
            }
            game.currentMissesLeft = game.maxMissesForCycle;
        }
    }

    game.shotMissile = null;
    if (!game.pendingExplosion) {
        checkGameOver();
    }
}

function findMatches(q, r) {
    if (!game.grid.has(key(q, r))) return [];
    const armorId = game.grid.get(key(q, r)).armorId;
    const stack = [[q, r]];
    const visited = new Set();
    const match = [];

    while (stack.length) {
        const node = stack.pop();
        const cq = node[0];
        const cr = node[1];
        const k = key(cq, cr);
        if (visited.has(k)) continue;
        visited.add(k);

        const cell = game.grid.get(k);
        if (!cell || cell.armorId !== armorId) continue;

        match.push([cq, cr]);
        const near = neighbors(cq, cr);
        for (let i = 0; i < near.length; i++) stack.push(near[i]);
    }

    return match;
}

function spawnExplosionCloud(x, y, armorId) {
    const armor = armorFromId(armorId);
    const puffCount = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < puffCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.8 + Math.random() * 2.4;
        game.explosionClouds.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.3,
            r: game.R * (0.18 + Math.random() * 0.28),
            life: 24 + Math.floor(Math.random() * 18),
            maxLife: 24 + Math.floor(Math.random() * 18),
            color: armor.accent,
            glow: armor.color
        });
    }
}

function updateExplosionClouds(frameScale) {
    for (let i = game.explosionClouds.length - 1; i >= 0; i--) {
        const p = game.explosionClouds[i];
        p.x += p.vx * frameScale;
        p.y += p.vy * frameScale;
        p.vx *= Math.pow(0.96, frameScale);
        p.vy = p.vy * Math.pow(0.96, frameScale) - 0.02 * frameScale;
        p.r *= Math.pow(1.015, frameScale);
        p.life -= frameScale;
        if (p.life <= 0 || p.r > game.R * 1.2) {
            game.explosionClouds.splice(i, 1);
        }
    }
}

function drawExplosionClouds() {
    for (let i = 0; i < game.explosionClouds.length; i++) {
        const p = game.explosionClouds[i];
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha * 0.55;
        ctx.shadowColor = p.glow;
        ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function explodeMatch() {
    if (!game.pendingExplosion) return;
    const prevArmor = activeArmorIds();
    const comboMultiplier = Math.max(1, game.combo);

    game.pendingExplosion.forEach(pair => {
        const k = key(pair[0], pair[1]);
        const cell = game.grid.get(k);
        const pos = hexToPixel(pair[0], pair[1]);
        if (cell) {
            spawnExplosionCloud(pos.x, pos.y, cell.armorId);
        }
        game.grid.delete(key(pair[0], pair[1]));
        game.score += game.MATCH_SCORE * comboMultiplier;
    });

    game.pendingExplosion = null;
    game.islandTimer = 15;
    checkArmorClears(prevArmor);
    checkWin();
    checkGameOver();
}

function removeFloating() {
    const visited = new Set();
    const stack = [];

    game.grid.forEach((v, k) => {
        const parts = k.split(",").map(Number);
        if (parts[1] === 0) stack.push([parts[0], parts[1]]);
    });

    while (stack.length) {
        const node = stack.pop();
        const q = node[0];
        const r = node[1];
        const k = key(q, r);
        if (visited.has(k)) continue;
        visited.add(k);

        const near = neighbors(q, r);
        for (let i = 0; i < near.length; i++) {
            if (game.grid.has(key(near[i][0], near[i][1]))) stack.push(near[i]);
        }
    }

    const prevArmor = activeArmorIds();
    game.grid.forEach((v, k) => {
        if (!visited.has(k)) {
            game.grid.delete(k);
            game.score += game.FLOATING_SCORE * Math.max(1, game.combo);
        }
    });

    checkArmorClears(prevArmor);
    checkWin();
}

function checkArmorClears(previousArmorList) {
    const currentSet = new Set(activeArmorIds());
    let clearedCount = 0;

    for (let i = 0; i < previousArmorList.length; i++) {
        const id = previousArmorList[i];
        if (!currentSet.has(id)) {
            game.clearedArmor.add(id);
            clearedCount++;
        }
    }

    if (clearedCount > 0) {
        game.score += game.ARMOR_CLEAR_BONUS * clearedCount;
    }
}

function dropCeiling() {
    const newGrid = new Map();
    const qShift = game.dropShiftLeftNext ? -1 : 0;

    game.grid.forEach((v, k) => {
        const parts = k.split(",").map(Number);
        const q = parts[0];
        const r = parts[1];
        const nextQ = q + qShift;
        const p = hexToPixel(nextQ, r + 1);
        if (p.x >= game.R && p.x <= canvas.width - game.R) {
            newGrid.set(key(nextQ, r + 1), v);
        }
    });

    const startQ = -Math.floor((game.COLS + 4) / 2);
    for (let i = 0; i <= game.COLS + 4; i++) {
        const q = startQ + i;
        const p = hexToPixel(q, 0);
        if (p.x >= game.R && p.x <= canvas.width - game.R) {
            newGrid.set(key(q, 0), { armorId: randomArmor("ceiling").id });
        }
    }

    game.grid = newGrid;
    game.dropShiftLeftNext = !game.dropShiftLeftNext;
}

function showOverlay(title) {
    uiTitle.innerText = title;
    uiScore.innerText = "Score: " + game.score;
    uiOverlay.style.display = "block";
}

function checkGameOver() {
    if (game.gameOver || game.win) return;

    for (const [k] of game.grid) {
        const parts = k.split(",").map(Number);
        const p = hexToPixel(parts[0], parts[1]);
        if (p.y > game.launcher.y - game.R * 2) {
            game.gameOver = true;
            showOverlay("Mission Failed");
            return;
        }
    }
}

function checkWin() {
    if (game.grid.size === 0) {
        game.score += game.BOARD_CLEAR_BONUS;
        game.win = true;
        showOverlay("Sector Cleared");
    }
}

function shareScore(platform) {
    const text = `Missile Shooter score: ${game.score} points, level ${game.level}. Match armor classes and beat this run.`;
    const emoji = "🚀🏹🎯";
    const url = encodeURIComponent(location.href);
    let shareUrl = "";

    if (platform === "copy") {
        const copyText = `${text} ${emoji}\n${location.href}`;
        navigator.clipboard.writeText(copyText).then(() => {
            alert("Score copied to clipboard!");
        }).catch(err => {
            console.error("Failed to copy:", err);
            alert("Failed to copy to clipboard");
        });
        return;
    }

    if (platform === "x") {
        shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text + " " + emoji)}&url=${url}`;
    }
    if (platform === "wa") {
        shareUrl = `https://wa.me/?text=${encodeURIComponent(location.href + "\n" + text)}`;
    }
    if (platform === "tg") {
        shareUrl = `https://t.me/share/url?url=${url}&text=${encodeURIComponent(text + " " + emoji)}`;
    }

    window.open(shareUrl, "_blank");
}

function update(deltaSeconds) {
    if (game.gameOver || game.win) return;

    const frameScale = deltaSeconds * game.REFERENCE_FPS;

    updateExplosionClouds(frameScale);

    if (game.explosionTimer > 0) {
        game.explosionTimer = Math.max(0, game.explosionTimer - frameScale);
        if (game.explosionTimer === 0) explodeMatch();
    }
    if (game.islandTimer > 0) {
        game.islandTimer = Math.max(0, game.islandTimer - frameScale);
        if (game.islandTimer === 0) removeFloating();
    }

    if (game.shotMissile && game.shotMissile.moving) {
        advanceShotMissile(frameScale);
    }
}

function drawTrajectory() {
    if (!game.settings.showAimGuide) return;
    if (game.shotMissile || game.gameOver || game.win || (game.isTouchDevice && !game.touchAimActive)) return;

    let dx = game.mouseX - game.launcher.x;
    let dy = game.mouseY - game.launcher.y;
    if (dy > -10) return;

    let angle = Math.atan2(dy, dx);
    let vx = Math.cos(angle) * game.SPEED;
    let vy = Math.sin(angle) * game.SPEED;
    const path = traceMissilePath(game.launcher.x, game.launcher.y, vx, vy, 60 * 2.5);
    if (path.length < 2) return;

    ctx.beginPath();
    ctx.setLineDash([8, 12]);
    ctx.strokeStyle = "rgba(255, 225, 140, 0.5)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.moveTo(path[0].x, path[0].y);

    for (let i = 1; i < path.length; i++) {
        ctx.lineTo(path[i].x, path[i].y);
    }

    ctx.stroke();
    ctx.setLineDash([]);
}

function drawDrone(x, y, armorId) {
    const armor = armorFromId(armorId);
    ctx.save();

    const bodyGrad = ctx.createRadialGradient(x - game.R * 0.35, y - game.R * 0.4, game.R * 0.25, x, y, game.R * 1.1);
    bodyGrad.addColorStop(0, armor.accent);
    bodyGrad.addColorStop(0.65, armor.color);
    bodyGrad.addColorStop(1, "#111827");

    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(x, y, game.R * 0.95, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, game.R * 0.65, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = "rgba(5, 10, 18, 0.55)";
    ctx.beginPath();
    ctx.arc(x, y, game.R * 0.28, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawMissileSprite(targetCtx, x, y, armorId, scale = 1) {
    const armor = armorFromId(armorId);
    const nose = 12 * scale;
    const body = 18 * scale;
    const halfH = 6 * scale;

    targetCtx.save();
    targetCtx.translate(x, y);

    targetCtx.beginPath();
    targetCtx.moveTo(-body * 0.5, -halfH);
    targetCtx.lineTo(body * 0.2, -halfH);
    targetCtx.lineTo(body * 0.5 + nose, 0);
    targetCtx.lineTo(body * 0.2, halfH);
    targetCtx.lineTo(-body * 0.5, halfH);
    targetCtx.closePath();

    const missileGrad = targetCtx.createLinearGradient(-body * 0.5, 0, body * 0.5 + nose, 0);
    missileGrad.addColorStop(0, "#22304f");
    missileGrad.addColorStop(0.55, armor.color);
    missileGrad.addColorStop(1, armor.accent);
    targetCtx.fillStyle = missileGrad;
    targetCtx.fill();

    targetCtx.strokeStyle = "rgba(255,255,255,0.35)";
    targetCtx.lineWidth = 1.3 * scale;
    targetCtx.stroke();

    targetCtx.fillStyle = "#111";
    targetCtx.fillRect(-body * 0.2, -halfH * 0.3, body * 0.22, halfH * 0.6);

    targetCtx.fillStyle = "#ff8655";
    targetCtx.beginPath();
    targetCtx.moveTo(-body * 0.5, -halfH * 0.65);
    targetCtx.lineTo(-body * 0.95, 0);
    targetCtx.lineTo(-body * 0.5, halfH * 0.65);
    targetCtx.closePath();
    targetCtx.fill();

    targetCtx.restore();
}

function drawGrid() {
    game.grid.forEach((v, k) => {
        const parts = k.split(",").map(Number);
        const p = hexToPixel(parts[0], parts[1]);
        drawDrone(p.x, p.y, v.armorId);
    });
}

function drawLauncher() {
    drawTrajectory();

    let aimAngle = Math.atan2(game.mouseY - game.launcher.y, game.mouseX - game.launcher.x);
    if (game.mouseY > game.launcher.y - 10) {
        aimAngle = -Math.PI / 2;
    }

    ctx.save();
    ctx.translate(game.launcher.x, game.launcher.y + 8);
    ctx.fillStyle = "#1a243d";
    ctx.strokeStyle = "#ffd97a";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-28, -14, 56, 24, 8);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(game.launcher.x, game.launcher.y - 6);
    ctx.rotate(aimAngle);
    drawMissileSprite(ctx, 0, 0, game.currentMissile.armorId, Math.max(1, game.R / 16));
    ctx.restore();

    if (game.shotMissile) {
        const angle = Math.atan2(game.shotMissile.vy, game.shotMissile.vx);
        ctx.save();
        ctx.translate(game.shotMissile.x, game.shotMissile.y);
        ctx.rotate(angle);
        drawMissileSprite(ctx, 0, 0, game.shotMissile.armorId, Math.max(0.95, game.R / 18));
        ctx.restore();
    }

    const startX = 22;
    const startY = canvas.height - 24;
    const gap = 22;
    for (let i = 0; i < game.currentMissesLeft; i++) {
        const x = startX + i * gap;
        ctx.save();
        ctx.translate(x, startY);
        ctx.rotate(-Math.PI / 2);
        ctx.globalAlpha = 0.9;
        drawMissileSprite(ctx, 0, 0, "ember", 0.58);
        ctx.restore();
    }
}

function drawNextMissilePreview() {
    nextMissileCtx.clearRect(0, 0, nextMissileCanvas.width, nextMissileCanvas.height);
    if (!game.nextMissile) return;
    drawMissileSprite(nextMissileCtx, nextMissileCanvas.width / 2, nextMissileCanvas.height / 2, game.nextMissile.armorId, 1.1);
}

function drawScore() {
    ctx.save();
    ctx.font = "bold 34px \"Trebuchet MS\", sans-serif";
    ctx.textAlign = "right";
    const sx = canvas.width - 20;
    const sy = canvas.height - 20;

    ctx.shadowColor = "#ffcf44";
    ctx.shadowBlur = 26;
    ctx.fillStyle = "rgba(255, 207, 68, 0.48)";
    ctx.fillText(game.score, sx, sy);

    ctx.shadowBlur = 10;
    ctx.fillStyle = "rgba(255, 242, 200, 0.95)";
    ctx.fillText(game.score, sx, sy);

    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(game.score, sx, sy);
    ctx.restore();
}

function drawCeiling() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
    ctx.fillRect(0, 0, canvas.width, game.ceilingY - 1);

    ctx.save();
    ctx.shadowColor = "#ffcf44";
    ctx.shadowBlur = 9;
    ctx.strokeStyle = "#ffcf44";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, game.ceilingY - 1);
    ctx.lineTo(canvas.width, game.ceilingY - 1);
    ctx.stroke();
    ctx.restore();

    ctx.font = "bold 13px sans-serif";
    ctx.fillStyle = "#ffcf44";
    ctx.textAlign = "left";
    ctx.fillText("LEVEL " + game.level, 10, game.ceilingY - 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawExplosionClouds();
    drawCeiling();
    drawLauncher();
    drawScore();
    drawNextMissilePreview();
}

game.lastFrameTime = performance.now();

function loop(timestamp) {
    const deltaSeconds = Math.min((timestamp - game.lastFrameTime) / 1000, 0.05);
    game.lastFrameTime = timestamp;
    update(deltaSeconds);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
